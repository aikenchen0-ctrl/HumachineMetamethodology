variant_rule_catalog:
  - rule_id: solution_list_artifact_boundary
    owner_mode: variant_and_composition_mode
    insertion_after_state: branch_plan_generation
    purpose: "Keep the candidate-solution list artifact separate from ranking semantics."
    required_inputs:
      - variant-set.json
    optional_inputs:
      - decision-weighting.json
    contract_rules:
      - "variant-set.json records comparable candidate variants and a default_variant pointer, but it does not compute ranking logic by itself."
      - "ranking_basis should point to a weighting artifact, optimization artifact, or explicit comparison basis rather than UI order or example numbering."
      - "When decision-weighting.json exists, variant-set.json should reference that weighting artifact through ranking_ref or default_selection_basis instead of restating the full ranking rule."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

