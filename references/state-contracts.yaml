states:
  - state_id: problem_intake
    display_name: 问题接收
    layer: core
    goal: "接收用户原始问题，判断任务是单步还是多步，并收集最小必要背景。"
    required_inputs:
      - name: user_raw_request
        type: string
        source: user
        description: "用户原始描述，不能为空。"
    optional_inputs:
      - name: user_role_or_stance
        type: string
        source: user_or_inference
        description: "用户立场、角色或观察视角。"
      - name: known_constraints
        type: array
        source: user
        description: "用户已知约束，如时间、权限、环境、成本。"
      - name: existing_files
        type: array
        source: workspace
        description: "用户显式给出的相关文件或已有产物。"
    output_file: intake-record.json
    output_fields:
      - name: request_id
        type: string
        required: true
        description: "本轮请求唯一标识。"
      - name: raw_request
        type: string
        required: true
        description: "未经重写的用户原始问题。"
      - name: task_mode
        type: string
        required: true
        allowed_values:
          - single_step
          - multi_step
        description: "任务模式判定。"
      - name: requester_stance
        type: string
        required: true
        description: "用户当前立场或默认观察视角。"
      - name: explicit_constraints
        type: array
        required: true
        description: "用户明确给出的约束列表。"
      - name: known_context
        type: array
        required: true
        description: "当前已知事实、文件、环境信息。"
      - name: intake_gaps
        type: array
        required: true
        description: "进入下一状态前仍可能缺失的信息。"
      - name: intake_status
        type: string
        required: true
        allowed_values:
          - ready
          - needs_more_context
        description: "当前接收状态是否已经可进入语义澄清。"
    ready_for_next_state_when:
      - "raw_request 非空"
      - "task_mode 已判定"
      - "intake_gaps 已被列出，即使不为空也必须显式记录"
    failure_modes:
      - code: missing_raw_request
        trigger: "用户未提供可解析的问题描述。"
        handling: "停留在问题接收，要求补充最小问题陈述。"
      - code: task_mode_undetermined
        trigger: "无法判断任务是单步还是多步。"
        handling: "默认降级为 multi_step，并在 intake_gaps 中记录原因。"
      - code: hidden_context_overload
        trigger: "相关上下文过多且尚未筛选。"
        handling: "只保留与本轮目标直接相关的文件和事实。"
    out_of_scope:
      - "不直接开始理论求解"
      - "不展开多路径深度搜索"

  - state_id: semantic_clarification
    display_name: 语义澄清
    layer: core
    goal: "把原始问题重写为较少歧义的结构化问题，并显式暴露关键术语和待确认点。"
    required_inputs:
      - name: intake_record
        type: object
        source: artifact:intake-record.json
        description: "问题接收状态的输出。"
    optional_inputs:
      - name: domain_terms
        type: array
        source: workspace_or_reference
        description: "已知领域术语，可用于术语比对。"
      - name: user_examples
        type: array
        source: user
        description: "用户额外补充的示例或反例。"
    output_file: problem-brief.json
    output_fields:
      - name: normalized_problem
        type: string
        required: true
        description: "经重表述后的核心问题，不保留不必要歧义。"
      - name: term_map
        type: array
        required: true
        description: "原始术语、候选替代表达、最终采用表达之间的映射。"
      - name: variable_map
        type: array
        required: true
        description: "把用户自然语言映射到后续模板或结构字段的变量表。"
      - name: clarification_mode
        type: string
        required: true
        description: "当前澄清模式，建议值为 strict 或 open_preserving。"
      - name: confirmation_loop_status
        type: string
        required: true
        description: "是否还需要继续确认循环，建议值为 stable、needs_followup 或 exploratory。"
      - name: ambiguities
        type: array
        required: true
        description: "仍未消除的歧义点。"
      - name: open_questions
        type: array
        required: true
        description: "必须追问或后续建模时补足的问题。"
      - name: clarified_scope
        type: array
        required: true
        description: "当前明确纳入分析范围的对象。"
      - name: user_intent_hypothesis
        type: string
        required: true
        description: "对用户真实意图的工作假设。"
      - name: clarification_status
        type: string
        required: true
        allowed_values:
          - ready
          - needs_user_confirmation
          - blocked
        description: "是否已经可进入需求约束建模。"
    ready_for_next_state_when:
      - "normalized_problem 已形成"
      - "term_map 非空"
      - "variable_map 已列出"
      - "clarification_mode 已显式记录"
      - "confirmation_loop_status 已显式记录"
      - "open_questions 已列出"
      - "clarification_status 为 ready"
    failure_modes:
      - code: unresolved_core_term
        trigger: "核心术语仍存在多重含义，且会改变后续建模。"
        handling: "保持在语义澄清，并把该术语放入 open_questions 首位。"
      - code: visible_real_demand_conflated
        trigger: "显性问题陈述与真实需求假设仍被混写，且会影响后续建模。"
        handling: "保持在语义澄清，并显式区分 visible_demand 与 real_demand_hypothesis。"
      - code: intent_hypothesis_too_weak
        trigger: "无法形成稳定的用户意图假设。"
        handling: "回退到问题接收，补充立场、目标或约束。"
      - code: over_rewrite
        trigger: "重写后偏离用户原始问题。"
        handling: "保留 raw_request 与 normalized_problem 的并行对照。"
    out_of_scope:
      - "不直接输出完整解决方案"
      - "不引入复杂理论框架作为默认步骤"

  - state_id: demand_constraint_modeling
    display_name: 需求约束建模
    layer: core
    goal: "基于澄清后的问题，构造最小问题模型，明确现状、目标、行动者、约束、资源和摩擦。"
    required_inputs:
      - name: problem_brief
        type: object
        source: artifact:problem-brief.json
        description: "语义澄清状态的输出。"
    optional_inputs:
      - name: search_notes_artifact
        type: object
        source: artifact:search-notes.json
        description: "有界 first_search 的补充证据，若存在则用于收束约束和问题边界。"
      - name: search_notes
        type: array
        source: lightweight_research
        description: "首次搜索得到的补充信息。"
      - name: local_context_files
        type: array
        source: workspace
        description: "与需求、资源、环境直接相关的文件。"
    output_file: constraints-matrix.json
    output_fields:
      - name: current_state
        type: object
        required: true
        description: "现状摘要，包含已知事实和问题起点。"
      - name: goal_state
        type: object
        required: true
        description: "目标状态摘要，允许保留不确定性。"
      - name: system_profile
        type: object
        required: true
        description: "系统名称、系统用途、系统结构组成、工作原理、技术演进阶段、当前运行环境。若不是系统问题，显式写空对象。"
      - name: objective_function
        type: string
        required: true
        description: "当前问题的核心目标函数表达；若无法量化，至少写成明确优化方向。"
      - name: survival_extremes
        type: array
        required: true
        description: "当前问题的一组不可突破下界或生存极值；若不存在，显式写空数组。"
      - name: actors
        type: array
        required: true
        description: "参与方、受影响方和关键行动者列表。"
      - name: actor_network_roles
        type: array
        required: true
        description: "从行动者网络视角标记 payer、decision、user、externality、evaluator 等角色；若不适用，显式写空数组。"
      - name: actor_thresholds
        type: array
        required: true
        description: "关键行动者的最低可接受底线、不可接受阈值和控制权维度。"
      - name: constraints
        type: array
        required: true
        description: "技术、权限、时间、成本、环境等约束。"
      - name: authorization_boundaries
        type: array
        required: true
        description: "自动化、代理执行或外部发送相关的授权边界；若不适用，显式写空数组。"
      - name: resources
        type: array
        required: true
        description: "当前可调动资源。"
      - name: frictions
        type: array
        required: true
        description: "当前主要摩擦、浪费或冲突。"
      - name: harmful_functions
        type: array
        required: true
        description: "显式记录谁对谁产生了什么负向作用。"
      - name: hidden_conditions
        type: array
        required: true
        description: "让负向作用持续成立的隐式条件。"
      - name: compensating_costs
        type: array
        required: true
        description: "沿常规修补路径会新增的寄生性代价或副作用。"
      - name: assumptions
        type: array
        required: true
        description: "暂时采用但尚未被验证的前提。"
      - name: problem_formation_chain
        type: array
        required: true
        description: "需求或问题是如何形成的链式摘要。"
      - name: excluded_scope
        type: array
        required: true
        description: "明确排除在当前 MVP 分析之外的内容。"
      - name: modeling_status
        type: string
        required: true
        allowed_values:
          - ready
          - incomplete
          - blocked
        description: "是否已经可进入分支计划生成。"
    ready_for_next_state_when:
      - "current_state 与 goal_state 均已显式记录"
      - "system_profile 已显式记录；若不是系统问题，则必须为空对象而不是省略"
      - "objective_function 已显式记录"
      - "survival_extremes 已显式记录"
      - "actors、constraints、resources、frictions 均非空"
      - "actor_network_roles、actor_thresholds、harmful_functions、hidden_conditions、compensating_costs、problem_formation_chain 已显式记录"
      - "authorization_boundaries 已显式记录；若问题不涉及授权边界，则必须为空数组而不是省略"
      - "excluded_scope 已显式列出"
      - "modeling_status 不是 blocked"
    failure_modes:
      - code: actor_model_missing
        trigger: "无法指出谁受影响、谁决策、谁执行。"
        handling: "停留在需求约束建模，优先补齐 actors。"
      - code: actor_network_roles_missing
        trigger: "actors 已列出，但没有明确谁在付费、决策、使用、承受外部性或评价。"
        handling: "停留在需求约束建模，补齐 actor_network_roles。"
      - code: constraints_not_actionable
        trigger: "约束描述过于抽象，不能指导分支规划。"
        handling: "把约束改写成可判断是否触犯的陈述。"
      - code: harmful_function_missing
        trigger: "只列出困难和约束，但没有明确谁对谁产生负向作用。"
        handling: "停留在需求约束建模，补齐 harmful_functions 与 hidden_conditions。"
      - code: missing_authorization_boundary
        trigger: "问题涉及自动化判断、自动发送、代理执行或升级流转，但未显式建模授权边界。"
        handling: "停留在需求约束建模，补齐 authorization_boundaries。"
      - code: unstable_goal_without_anti_goals
        trigger: "goal_state 仍不稳定，但未显式记录 anti_goals 或 survival_extremes。"
        handling: "停留在需求约束建模，先写失败状态、不可接受结果和存活边界。"
      - code: goal_state_collapses_into_solution
        trigger: "目标状态被直接写成具体实现方案。"
        handling: "把目标改写为状态或结果，而不是实现手段。"
    out_of_scope:
      - "不在此状态执行完整 SAFC/TRIZ/USIT 求解"
      - "不生成产品级 UI 方案"

  - state_id: branch_plan_generation
    display_name: 分支计划生成
    layer: core
    goal: "把最小问题模型拆成可执行分支，明确依赖关系、并行性和验证目标。"
    required_inputs:
      - name: constraints_matrix
        type: object
        source: artifact:constraints-matrix.json
        description: "需求约束建模状态的输出。"
    optional_inputs:
      - name: orchestration_rules
        type: array
        source: scope-boundary
        description: "最小编排规则，如并行判定、单轮步数限制。"
    output_file: branch-plan.json
    output_fields:
      - name: plan_id
        type: string
        required: true
        description: "当前分支计划唯一标识。"
      - name: planning_basis
        type: array
        required: true
        description: "该计划基于哪些问题模型字段生成。"
      - name: mode_resolution_ref
        type: string
        required: true
        description: "指向 mode-resolution.json 的引用；若无扩展模式，也要显式指向一个 resolved_modes 为空的文件。"
      - name: shared_assumptions
        type: array
        required: true
        description: "所有分支共享的假设。"
      - name: branches
        type: array
        required: true
        description: "分支列表，每个分支至少包含 branch_id、goal、dependencies、parallelizable、validation_target。"
      - name: unresolved_couplings
        type: array
        required: true
        description: "暂时无法切开的依赖耦合。"
      - name: recommended_execution_order
        type: array
        required: true
        description: "建议的执行顺序或阶段组。"
      - name: dag_view
        type: object
        required: true
        description: "将分支计划压成 DAG 视图；若不适用，显式写空对象。"
      - name: triple_view
        type: array
        required: true
        description: "将关键计划关系压成三元组列表；若不适用，显式写空数组。"
      - name: planning_status
        type: string
        required: true
        allowed_values:
          - ready
          - over_split
          - blocked
        description: "计划是否已经足够执行。"
    ready_for_next_state_when:
      - "mode-resolution.json 已生成"
      - "mode-resolution.json 已显式记录 stage_requirements 与 dispatch_actions"
      - "branches 非空"
      - "每个 branch 都有明确 goal"
      - "每个 branch 都有 dependencies 和 validation_target"
      - "dag_view 与 triple_view 已显式记录"
      - "planning_status 不是 blocked"
    failure_modes:
      - code: pseudo_parallelism
        trigger: "名义上并行，实际存在隐藏控制依赖。"
        handling: "把相关分支改回串行，或显式写出依赖。"
      - code: branch_too_large
        trigger: "单个分支仍然包含多个不可独立验证的目标。"
        handling: "继续拆小，但保持每个分支只解决一个主问题。"
      - code: over_split
        trigger: "分支数量过多，超出当前轮次处理能力。"
        handling: "只保留本轮最关键的分支，其余挂起。"
    out_of_scope:
      - "不直接执行各分支"
      - "不生成 UI 层方案切换视图"

  - state_id: evaluation_validation
    display_name: 评估校验
    layer: core
    goal: "对当前产物做完整性、一致性和阻塞性问题检查，给出下一步建议。"
    required_inputs:
      - name: branch_plan
        type: object
        source: artifact:branch-plan.json
        description: "分支计划生成状态的输出。"
      - name: mode_resolution
        type: object
        source: artifact:mode-resolution.json
        description: "本轮已激活模式及其产物要求。"
      - name: problem_brief
        type: object
        source: artifact:problem-brief.json
        description: "用于做语义一致性校验。"
      - name: constraints_matrix
        type: object
        source: artifact:constraints-matrix.json
        description: "用于做建模一致性校验。"
    optional_inputs:
      - name: additional_evidence
        type: array
        source: workspace_or_research
        description: "补充事实、局部验证结果或外部证据。"
    output_file: evaluation-report.xml
    output_fields:
      - name: evaluation_id
        type: string
        required: true
        description: "当前评估唯一标识。"
      - name: checked_artifacts
        type: array
        required: true
        description: "本轮参与检查的产物列表。"
      - name: completeness_score
        type: number
        required: true
        description: "完整性评分，范围 0 到 100。"
      - name: consistency_score
        type: number
        required: true
        description: "一致性评分，范围 0 到 100。"
      - name: blocking_issues
        type: array
        required: true
        description: "阻塞继续执行的问题。"
      - name: non_blocking_risks
        type: array
        required: true
        description: "非阻塞但需要记录的风险。"
      - name: recommended_action
        type: string
        required: true
        allowed_values:
          - proceed
          - revise
          - loop_back
          - stop
        description: "建议下一动作。"
      - name: recommended_loop_target
        type: string
        required: true
        description: "若需要回退，建议回到的状态。"
      - name: confidence
        type: number
        required: true
        description: "对当前评估结论的置信度，范围 0 到 1。"
      - name: advanced_mode_findings
        type: array
        required: true
        description: "高级模式相关发现；若未启用高级模式，显式写空数组。"
      - name: same_source_consistency
        type: object
        required: true
        description: "同源一致性校验结果。"
      - name: cross_format_consistency
        type: object
        required: true
        description: "异模同源一致性校验结果。"
      - name: fact_validation_chain
        type: array
        required: true
        description: "把关键结论拆解到事实颗粒度的验证链。"
      - name: unverifiable_assumptions
        type: array
        required: true
        description: "当前无法直接验证的假设。"
      - name: mode_requirement_checks
        type: array
        required: true
        description: "逐项记录本轮每个已激活模式的必需产物检查结果。"
      - name: missing_required_outputs
        type: array
        required: true
        description: "根据 mode-resolution 仍缺失的必需产物。"
      - name: requested_output_status
        type: array
        required: true
        description: "用户显式点名的输出当前是否已生成。"
      - name: stage_requirement_checks
        type: array
        required: true
        description: "逐项记录各阶段模式产物要求是否满足。"
      - name: missing_stage_outputs
        type: array
        required: true
        description: "按阶段记录仍缺失的模式产物。"
      - name: dispatch_recommendations
        type: array
        required: true
        description: "根据阶段缺口给出的默认回退和补产物建议。"
    ready_for_next_state_when:
      - "checked_artifacts 至少包含 problem_brief、constraints_matrix、branch_plan"
      - "recommended_action 已给出"
      - "blocking_issues 已列出，即使为空也必须显式记录"
      - "same_source_consistency、cross_format_consistency、fact_validation_chain、unverifiable_assumptions 已显式记录"
      - "mode_requirement_checks、missing_required_outputs、requested_output_status 已显式记录"
      - "stage_requirement_checks、missing_stage_outputs、dispatch_recommendations 已显式记录"
    failure_modes:
      - code: self_score_without_findings
        trigger: "给出分数但没有对应的发现依据。"
        handling: "要求所有分数必须附带至少一条证据或判断理由。"
      - code: inconsistent_artifact_set
        trigger: "不同产物之间的核心对象名称或目标不一致。"
        handling: "建议回退到语义澄清或需求约束建模。"
      - code: false_ready
        trigger: "评估结论为 proceed，但仍存在未关闭的阻塞问题。"
        handling: "强制改写 recommended_action 为 loop_back 或 revise。"
    out_of_scope:
      - "不把自打分当成唯一验证手段"
      - "不跳过显式问题列表直接结束流程"

  - state_id: loop_or_finish
    display_name: 循环或结束
    layer: core
    goal: "根据评估报告做正式决策：回退修复、继续下一轮，或结束本轮。"
    required_inputs:
      - name: evaluation_report
        type: object
        source: artifact:evaluation-report.xml
        description: "评估校验状态的输出。"
    optional_inputs:
      - name: user_override
        type: object
        source: user
        description: "用户对继续、停止或回退目标状态的明确覆盖。"
    output_file: loop-decision.json
    output_fields:
      - name: decision_id
        type: string
        required: true
        description: "当前决策唯一标识。"
      - name: decision
        type: string
        required: true
        allowed_values:
          - finish
          - loop
          - revise_in_place
        description: "本轮正式决策。"
      - name: rationale
        type: array
        required: true
        description: "做出该决策的理由列表。"
      - name: loop_target_state
        type: string
        required: true
        description: "若 decision 为 loop，则给出回退目标状态。否则为空字符串。"
      - name: required_repairs
        type: array
        required: true
        description: "进入下一轮前必须修补的内容。"
      - name: final_artifact_set
        type: array
        required: true
        description: "本轮确认保留的产物。"
      - name: stop_reason
        type: string
        required: true
        description: "若结束，则说明结束原因。"
      - name: next_action_summary
        type: string
        required: true
        description: "面向下一轮或最终输出的简要动作摘要。"
      - name: advanced_mode_status
        type: string
        required: true
        description: "高级模式状态；若未启用高级模式，显式写 none。"
      - name: unresolved_mode_requirements
        type: array
        required: true
        description: "本轮仍未满足的模式产物要求；若为空则显式写空数组。"
      - name: scope_alignment_decision
        type: string
        required: true
        description: "当前轮 scope 对齐结论；若不适用则写 not_applicable。"
      - name: scope_repair_target
        type: string
        required: true
        description: "若存在 scope drift，显式给出默认修复目标状态；若无则写空字符串。"
      - name: stage_dispatch_target
        type: string
        required: true
        description: "若某阶段模式产物缺失，显式给出默认回退状态；若无则写空字符串。"
    ready_for_next_state_when:
      - "decision 已确定"
      - "如果 decision 为 loop，则 loop_target_state 非空"
      - "required_repairs 已列出，即使为空也必须显式记录"
      - "advanced_mode_status 已显式记录"
      - "unresolved_mode_requirements 已显式记录"
      - "scope_alignment_decision 已显式记录"
      - "scope_repair_target 已显式记录"
      - "stage_dispatch_target 已显式记录"
