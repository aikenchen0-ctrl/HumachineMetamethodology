core_rule_catalog:
  - rule_id: workflow_state_chain
    owner_layer: source_aligned_core
    purpose: "Make the minimal core workflow shell explicit instead of leaving it diffused across mixed source branches."
    required_states:
      - problem_intake
      - semantic_clarification
      - demand_constraint_modeling
      - branch_plan_generation
      - evaluation_validation
      - loop_or_finish
    terminal_states:
      - finish
    required_artifacts:
      - intake-record.json
      - problem-brief.json
      - constraints-matrix.json
      - branch-plan.json
      - evaluation-report.xml
      - loop-decision.json
    contract_rules:
      - "branch_plan_generation is the last core planning state; branch classes remain plan objects and do not become workflow states."
      - "evaluation_validation audits coherence and required outputs; it does not dispatch execution as a replacement for the workflow shell."
      - "loop_or_finish owns routing and finish gating, while loop logic remains separated into its own active loop rule."
      - "The core workflow shell remains valid whether or not extension modes are active."
    evaluation_hooks:
      - same_source_consistency
      - stage_requirement_checks

  - rule_id: orchestration_extension_boundary
    owner_layer: source_aligned_core
    purpose: "Keep workflow shell semantics separate from orchestration-heavy execution semantics."
    required_inputs:
      - branch-plan.json
      - mode-resolution.json
    optional_inputs:
      - orchestration-plan.json
      - execution-supervision.json
    contract_rules:
      - "parallel_branch, parallel_worker, serial_branch, suspended_traversal, and parallel_fork are orchestration branch classes rather than workflow states."
      - "shared-context-map.json, execution-supervision.json, executor-interface.json, executor-capability-registry.json, memory-pruning.json, and writeback-ledger.json attach around the core shell but do not redefine it."
      - "runtime, provider, and long-horizon governance operations remain derived extensions and must not be absorbed into the core workflow shell by default."
    evaluation_hooks:
      - same_source_consistency
      - scope_alignment_checks

advanced_mode:
  activation_if:
    - "用户明确要求继续执行 metaPrompt v2 中第 7 到第 10 章对应的深层建模与求解扩展。"
    - "用户明确要求资源图、行动者网络图、流分析、SAFC、USIT32、TRIZ 或系统级解决方案集。"
    - "基础模式已完成 constraints-matrix，但仍无法直接求解，且问题明显需要深度系统建模。"
  note: "高级模式依附于基础六状态，不额外引入新的主状态。"

template_mode:
  activation_if:
    - "用户明确要求把当前方法转成模板或模板链。"
    - "用户明确要求变量映射、批量探索、共享上下文结构或收敛剪枝记录。"
    - "当前产物已经足够稳定，适合被压缩成可复用模板。"
  note: "模板模式依附于基础模式或高级模式产物，不额外引入新的主状态。"

library_and_weighting_mode:
  activation_if:
    - "用户明确要求参数库、效应库、临时库、名词变量、引导用户提示词、图格式选择或权重排序。"
    - "当前分析已经足够稳定，适合继续库化或做权重决策。"
    - "当前需要显式排序，但尚未给出人类权重，或需要记录权重来源与兜底方法。"
  note: "库与权重模式依附于基础模式、高级模式或模板模式产物。"

orchestration_and_memory_mode:
  activation_if:
    - "用户明确要求并行分支、并行、悬置遍历、执行监督、共享上下文或记忆剪枝。"
    - "当前问题需要正式定义分支类型和可见上下文范围。"
  note: "编排与记忆模式依附于已有分析产物，不额外引入新的主状态。"
  source_aligned_core_outputs:
    - orchestration-plan.json
    - execution-supervision.json
    - executor-interface.json
    - executor-capability-registry.json
    - memory-pruning.json
    - writeback-ledger.json
  derived_runtime_extension_only_if:
    - "当前任务明确涉及真实 runtime signal、外部 service hook、provider topology、持续 drift monitor 或长期治理运维。"
    - "不得因为用户只提到分支、共享文件、执行监督、反馈或治理，就自动扩展到 runtime/provider/governance 运维层。"

variant_and_composition_mode:
  activation_if:
    - "用户明确要求多个方案、步骤归一化、依赖修复或从多个方案中组合新方案。"
    - "当前输出已经不是单一路径，而是多个可比较替代项。"
  note: "方案变体与组合模式依附于 branch-plan 或 solution-set 产物。"

traversal_and_invention_mode:
  activation_if:
    - "用户明确要求微观发散遍历、启发式过滤、IFR、40个发明措施或措施联合体。"
    - "当前问题已经识别矛盾，但还需要系统化展开解空间。"
    - "用户明确要求适当剃刀、维度锚定、黑盒化，或强调要停留在正确维度上。"
  note: "遍历与发明模式依附于高级模式或基础模式的矛盾识别结果。"

discovery_and_hypothesis_mode:
  activation_if:
    - "用户明确要求保留开放性、反复确认、潜在需求发现、需求可见性塑造、场域创造需求、认知节能需求、需求不可见障碍、早期试用者信号或显式假设管理。"
    - "当前问题仍处于模糊现状与模糊目标状态之间，需要先做需求可见性与假设治理。"
    - "基础链路的 visible_demand / real_demand_hypothesis 已不足以承载潜在需求、可见性障碍或开放假设治理。"
  note: "发现与假设模式优先服务于语义澄清和需求约束建模。"

portfolio_and_optimization_mode:
  activation_if:
    - "用户明确要求五向接近最优、方法论分支、研究计划、执行计划或近似最优比较。"
    - "当前问题已经形成多目标、多路径、多约束的组合决策。"
    - "用户明确要求层次分析法、成对比较矩阵、人设权重优先或研究计划与执行计划分层。"
  note: "组合优化模式依附于基础模式、高级模式和库与权重模式产物。"

governance_and_feedback_mode:
  activation_if:
    - "用户明确要求人类可视修改、交互风格控制、覆盖权重规则或现实反馈闭环。"
    - "当前流程需要明确定义哪些节点允许人类覆盖。"
    - "用户明确要求选择式/启发式提问、人设权重优先，或要求无人输入时才回退自动权重。"
  note: "治理与反馈模式依附于现有分析和执行产物。"

representation_and_serialization_mode:
  activation_if:
    - "用户明确要求 xml、Mermaid、DAG、三元组或数学逻辑格式输出。"
    - "当前分析已经足够稳定，适合导出为特定表示层格式。"
    - "下游明确需要标签化输出、交互顺序图、依赖图、三元组压缩或逻辑条件表达。"
  note: "表示与序列化模式依附于已有分析产物，不替代主 artifact。"

