library_rule_catalog:
  - rule_id: multiple_solution_sorting_rule
    owner_mode: library_and_weighting_mode
    insertion_after_state: branch_plan_generation
    purpose: "Separate ranking semantics from UI order and example phrasing when multiple candidates must be sorted."
    required_inputs:
      - decision-weighting.json
    optional_inputs:
      - variant-set.json
      - branch-plan.json
      - override-policy.json
    contract_rules:
      - "decision-weighting.json owns ranking semantics, criteria, derived weights, and ranking_result."
      - "ranking_scope or ranked_subjects_ref must bind the ranked subjects to stable branch ids or variant ids rather than display order or example numbering."
      - "If variant-set.json exists, default_variant must be justified by the weighted ranking or explicit override basis rather than by first-item presentation order."
      - "Illustrative phrases such as '方案一提示词' remain example residue and must not become executable ranking logic."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

orchestration_rule_catalog:
  - rule_id: shared_context_contract
    owner_mode: orchestration_and_memory_mode
    insertion_after_state: branch_plan_generation
    purpose: "Replace the generic shared-file tool metaphor with an explicit shared coordination contract."
    required_inputs:
      - orchestration-plan.json
    required_outputs:
      - shared-context-map.json
    optional_outputs:
      - execution-supervision.json
      - executor-interface.json
    contract_rules:
      - "shared-context-map.json is the planning source for shared files, ownership, read scope, write scope, and synchronization notes."
      - "execution-supervision.json may refine coordination behavior, but it must not silently redefine shared ownership or write/read boundaries already declared in shared-context-map.json."
      - "executor-interface.json may bind execution units to writable targets, but those bindings must stay inside the shared context contract."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

  - rule_id: write_scope_rule
    owner_mode: orchestration_and_memory_mode
    insertion_after_state: branch_plan_generation
    purpose: "Make write permissions and prohibited cross-branch writes auditable instead of leaving them implicit in a shared-file tool idea."
    required_inputs:
      - shared-context-map.json
      - execution-supervision.json
      - executor-interface.json
    required_outputs:
      - execution-supervision.json
      - executor-interface.json
    optional_outputs:
      - writeback-ledger.json
    contract_rules:
      - "execution-supervision.json must bind shared_file_contracts and prohibited_cross_branch_writes to the write_scope declared in shared-context-map.json."
      - "executor-interface.json writable_targets must be a subset of the writable surface implied by shared-context-map.json and execution-supervision.json."
      - "Expected writebacks must only target artifacts or shared files that the write scope explicitly allows."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

  - rule_id: writeback_audit_rule
    owner_mode: orchestration_and_memory_mode
    insertion_after_state: loop_or_finish
    purpose: "Turn shared-file coordination into auditable writeback evidence rather than leaving merge results implicit."
    required_inputs:
      - execution-supervision.json
    optional_inputs:
      - shared-context-map.json
    optional_outputs:
      - writeback-ledger.json
    contract_rules:
      - "If execution-supervision.json contains non-empty shared_file_contracts or checkpoint_writebacks, writeback-ledger.json must be generated before finish."
      - "When shared-context-map.json exists, writeback-ledger.json should record which shared context contract and audited writeback surfaces it closes."
      - "merge_decisions and conflict_events must make shared-file coordination outcomes auditable instead of collapsing them into a final merged result only."
    evaluation_hooks:
      - fact_validation_chain
      - mode_interaction_checks

  - rule_id: execution_unit_contract
    owner_mode: orchestration_and_memory_mode
    insertion_after_state: branch_plan_generation
    purpose: "Replace child-agent identity language with explicit execution unit semantics."
    required_inputs:
      - execution-supervision.json
      - executor-interface.json
    contract_rules:
      - "executor-interface.json execution_units are the authoritative execution identities for the current round."
      - "execution-supervision.json assignment_units must map supervision targets to explicit execution units rather than to informal agent labels."
      - "executor_kind_bindings, required_capability_bindings, and completion_signals must be bound per execution unit."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

  - rule_id: worker_scope_contract
    owner_mode: orchestration_and_memory_mode
    insertion_after_state: branch_plan_generation
    purpose: "Make worker scope explicit instead of leaving role boundaries attached to agent identity language."
    required_inputs:
      - execution-supervision.json
      - executor-interface.json
    contract_rules:
      - "execution-supervision.json worker_scopes define the bounded task scope, readable context, and prohibited writes for each execution unit."
      - "executor-interface.json unit_objectives, visibility_bindings, permission_bindings, writable_targets, and prohibited_targets must stay inside the declared worker scope."
      - "If two execution units differ materially in scope, that difference must be represented by worker_scopes and interface bindings rather than by informal role names."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

  - rule_id: reference_context_binding_rule
    owner_mode: orchestration_and_memory_mode
    insertion_after_state: branch_plan_generation
    purpose: "Normalize reference-context handling as a contract boundary instead of a child-agent capability intuition."
    required_inputs:
      - execution-supervision.json
      - executor-interface.json
    contract_rules:
      - "execution-supervision.json reference_context_policy defines how upstream context is treated as reference material rather than freely rewritten memory."
      - "executor-interface.json reference_context_refs must point execution units to the reference context they may read without implying ownership of that context."
      - "resume_signals and checkpoint_hook_bindings must preserve continuity without collapsing reference context into mutable identity memory."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

  - rule_id: memory_pruning_rule
    owner_mode: orchestration_and_memory_mode
    insertion_after_state: loop_or_finish
    purpose: "Replace the generic history-memory editing tool idea with explicit pruning and reactivation semantics."
    required_inputs:
      - memory-pruning.json
    contract_rules:
      - "memory-pruning.json owns pruning decisions, suspended paths, reactivation conditions, memory_edit_targets, and replacement_summaries."
      - "pruned_paths and suspended_paths must be justified by pruning_reasons and prune_after_failed_rounds rather than by informal tool usage."
      - "replacement_summaries must preserve enough continuity for later reactivation without reintroducing the full discarded history."
    evaluation_hooks:
      - fact_validation_chain
      - mode_interaction_checks

  - rule_id: writeback_memory_edit_event
    owner_mode: orchestration_and_memory_mode
    insertion_after_state: loop_or_finish
    purpose: "Make memory-edit writeback events explicit and auditable instead of leaving history replacement implicit."
    required_inputs:
      - writeback-ledger.json
    optional_inputs:
      - memory-pruning.json
    contract_rules:
      - "writeback-ledger.json memory_edit_events are the authoritative audit trail for actual memory replacement or pruning writebacks."
      - "If memory-pruning.json names memory_edit_targets or replacement_summaries, writeback-ledger.json should record the corresponding memory_edit_events."
      - "memory_edit_events must not be collapsed into generic merge_decisions when history replacement materially changes future context."
    evaluation_hooks:
      - same_source_consistency
      - fact_validation_chain

  - rule_id: replacement_summary_rule
    owner_mode: orchestration_and_memory_mode
    insertion_after_state: loop_or_finish
    purpose: "Keep replacement summaries as an explicit semantic bridge between pruned history and future continuation."
    required_inputs:
      - memory-pruning.json
    optional_inputs:
      - writeback-ledger.json
    contract_rules:
      - "replacement_summaries should preserve the kept conclusion, the discarded path identity, and the reactivation boundary."
      - "retained_summaries and replacement_summaries must stay consistent so later rounds do not lose why a path was cut and what remains reusable."
      - "If writeback-ledger.json records memory_edit_events, the replacement summary should be referentially aligned with those edits."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

