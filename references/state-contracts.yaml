    required_inputs:
      - constraints-matrix.json
    optional_inputs:
      - search-notes.json
    required_outputs:
      - resource-graph.json
    optional_outputs:
      - resource-priority-policy.json
    contract_rules:
      - "search-notes.json records bounded scan evidence and unresolved resource questions; it must not be treated as the resource graph itself."
      - "resource-graph.json records discovered resources, their structure, and substitution options; it must stay separate from scan narration."
      - "If the round declares explicit scan ordering or resource ranking, resource-priority-policy.json should carry that policy instead of embedding the whole rule inside resource-graph.json."
    evaluation_hooks:
      - same_source_consistency
      - fact_validation_chain

