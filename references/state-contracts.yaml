      - migration_id
      - source_artifact
      - target_artifact
      - source_identity_mode
      - target_identity_mode
      - item_mappings
      - compatibility_guidance
      - migration_status

  - artifact_id: decision_weighting
    file: decision-weighting.json
    format: json
    insertion_after_state: loop_or_finish
    purpose: "记录分支或方案的权重决策结果。"
    required_top_level_fields:
      - criteria
      - pairwise_matrix
      - consistency_check
      - derived_weights
      - ranking_result
    optional_top_level_fields:
      - human_weight_input
      - weight_source
      - fallback_used
      - override_handoff_target
      - ranking_scope

