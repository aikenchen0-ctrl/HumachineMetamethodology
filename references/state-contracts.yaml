contract_version: 1
skill_scope: hmm-mvp
source_files:
  - scope-boundary.md
  - node-taxonomy.md
  - terminology-policy.md
  - metaPrompt.md
  - agentic-nested-state-machine.opml

source_mode_files:
  - references/core-method.md
  - references/advanced-mode.md
  - references/template-mode.md
  - references/output-and-evaluation.md
  - references/source-alignment-policy.md
  - references/screen-and-critique-mode.md
  - references/library-and-weighting-mode.md
  - references/orchestration-and-memory-mode.md
  - references/variant-and-composition-mode.md
  - references/traversal-and-invention-mode.md
  - references/discovery-and-hypothesis-mode.md
  - references/portfolio-and-optimization-mode.md
  - references/governance-and-feedback-mode.md
  - references/representation-and-serialization-mode.md

source_alignment:
  direct_source_reference:
    - metaPrompt.md
    - agentic-nested-state-machine.opml
  dual_source_precedence:
    chapter_order_authority: metaPrompt.md
    linear_step_order_authority: metaPrompt.md
    mother_structure_authority: agentic-nested-state-machine.opml
    normalization_assets_must_not_override_source: true
    conflict_rule: "Prefer metaPrompt.md for chapter order and mainline semantics, and prefer agentic-nested-state-machine.opml for branching, orchestration, archive, and surrounding source-structure semantics."
    typed_dual_source_companions:
      meta_prompt_linear_scaffold_compatibility_only: true
      meta_prompt_linear_scaffold: references/metaPrompt-step-index.json
      meta_prompt_chapter_scaffold: references/metaPrompt-step-index.json
      opml_mother_structure: references/typed-source-node-index.yaml
  meta_prompt_runtime_compression:
    maintained_source_structure: chapter_based_metaPrompt_v2
    maintained_mainline_chapters:
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
      - 10
      - 11
    runtime_shell_is_compression: true
    note: "The six-state shell remains the runtime MVP, but references/metaPrompt.md chapter order is the maintained source authority."
  default_core_capabilities:
    - problem_intake
    - semantic_clarification
    - demand_constraint_modeling
    - branch_plan_generation
    - evaluation_validation
    - loop_or_finish
  source_first_class_conditional_layers:
    - retrieval_and_evidence_writeback
    - resource_and_system_levels
    - candidate_generation
    - evaluation_and_implementation
    - pluginization_and_skill_exteriorization
  source_aligned_core_modes:
    - advanced_mode
    - template_mode
    - library_and_weighting_mode
    - orchestration_and_memory_mode
    - variant_and_composition_mode
    - traversal_and_invention_mode
    - discovery_and_hypothesis_mode
    - portfolio_and_optimization_mode
    - governance_and_feedback_mode
    - representation_and_serialization_mode
  source_aligned_core_modes_note: "This list enumerates source-grounded mode families. Inclusion here does not imply default activation in the neutral core."
  source_aligned_orchestration_outputs:
    - orchestration-plan.json
    - shared-context-map.json
    - execution-supervision.json
    - executor-interface.json
    - executor-capability-registry.json
    - memory-pruning.json
    - writeback-ledger.json
  source_aligned_orchestration_outputs_note: "These outputs belong to a source-grounded orchestration subset and should activate only when the round explicitly requires coordination, shared context, or pruning behavior."
  derived_runtime_extension_outputs:
    - executor-runtime-hook.json
    - runtime-event-source-contract.json
    - runtime-event-source-registry.json
    - runtime-event-source-service-hook.json
    - runtime-schema-registry-hook.json
    - consumer-runtime-discovery.json
    - source-of-truth-drift-monitor.json
    - drift-monitor-scheduler.json
    - alert-delivery-contract.json
    - delivery-provider-capability-matrix.json
    - provider-health-check.json
    - provider-health-telemetry.json
    - provider-telemetry-stream-contract.json
    - channel-failover-policy.json
    - circuit-breaker-policy.json
    - adaptive-threshold-policy.json
    - threshold-governance-workflow.json
    - baseline-governance-service-hook.json
    - governance-source-drift-report.json
    - governance-review-scheduler.json
    - governance-provider-capability-matrix.json
  default_rule: "当任务是回到原始 source 对齐 skill 自身时，优先保留 source-aligned core；derived runtime extension 必须显式限域，不得因一般 orchestration 诉求自动激活。"

naming_policy:
  state_id_style: snake_case
  artifact_file_style: kebab-case
  required_artifact_formats:
    - json
    - yaml
    - xml
  note: "状态名面向流程，artifact 名面向文件系统；同一状态只绑定一个主产物文件。"

source_review_reference_policy:
  default_rule: "These files are lightweight reference contracts for source-aligned architecture review. They guide example selection, node promotion, and backlog prioritization, but they do not replace per-round stage outputs."
  required_when:
    - "The task critiques or improves the abstract functional design of agentic-nested-state-machine.opml."
    - "The task decides whether a source-derived node should remain an example, become a rule, become an active contract, or become an archived reference."
    - "The task prioritizes which source-derived ideas should be split, renamed, archived, or promoted next."
  consistency_expectations:
    - "examples-index.json, source-node-promotion-catalog.json, and opml-promotion-backlog.json must cross-reference each other through stable ids."
    - "opml-promotion-status-model.json defines the allowed promotion statuses and gate logic consumed by the catalog and backlog."
    - "typed-source-node-index.yaml is the maintenance authority for source_label, node_type, scope_layer, source_plane, and source locator fields when a source node is covered there."
    - "source-node-promotion-catalog.json is the maintenance authority for promotion_status, promotion_basis, downstream_consumers, and evaluation_hooks."
    - "release-consolidation-checklist.json should explicitly place every source-review reference asset into a loading tier."
    - "These files may classify or prioritize active contracts, but they must not redefine the schema of active per-round artifacts."
  finish_guard_rule: "These reference contracts are not finish guards by themselves; they become relevant only when the round explicitly includes source review, promotion review, or example selection."

source_review_reference_catalog:
  - reference_id: examples_index
    file: references/examples-index.json
    format: json
    paired_human_readable_ref: references/examples-index.md
    role: standard_cross_mode_example_catalog
    purpose: "Machine-readable catalog of standard cross-mode examples used to choose mode-resolution and evaluation-report interaction patterns."
    required_top_level_fields:
      - catalog_id
      - purpose
      - reading_order
      - examples
      - coverage_status
    key_entry_fields:
      - example_id
      - covered_modes
      - mode_resolution_example
      - evaluation_report_example
      - key_interaction_focus
      - architecture_focus
      - related_source_nodes
      - related_backlog_items
    consumed_by:
      - branch_plan_generation
      - evaluation_validation
      - loop_or_finish
    cross_reference_requirements:
      - "Each example entry must point to both a mode-resolution example and an evaluation-report example."
      - "related_backlog_items must resolve to item_id values in references/opml-promotion-backlog.json."
      - "related_source_nodes must resolve to source_node_id values in references/source-node-promotion-catalog.json."

  - reference_id: opml_promotion_status_model
    file: references/opml-promotion-status-model.json
    format: json
    paired_human_readable_ref: references/opml-promotion-status-model.md
    role: source_node_promotion_model
    purpose: "Machine-readable promotion model defining which source-originated ideas remain examples, become candidate rules, become active contracts, or become archived references."
    required_top_level_fields:
      - model_id
      - purpose
      - statuses
      - promotion_gates
      - promotion_tests
      - candidate_rule_extra_tests
      - demotion_rules
      - suggested_machine_fields
    key_entry_fields:
      - status_id
      - allowed_roles
      - properties
      - from_status
      - to_status
      - gate_checks
    consumed_by:
      - evaluation_validation
      - loop_or_finish
    cross_reference_requirements:
      - "Status values used by references/source-node-promotion-catalog.json and references/opml-promotion-backlog.json must come from this model."
      - "Promotion and demotion reasoning in architecture review should reference this model before changing source-node status."

  - reference_id: source_node_promotion_catalog
    file: references/source-node-promotion-catalog.json
    format: json
    role: source_node_inventory
    purpose: "Machine-readable catalog mapping important OPML source nodes to their current promotion status, blockers, consumers, and recommended next moves."
    required_top_level_fields:
      - catalog_id
      - source_file
      - entries
    key_entry_fields:
      - source_node_id
      - source_label
      - node_type
      - scope_layer
      - promotion_status
      - promotion_basis
      - promotion_gates_passed
      - downstream_consumers
      - authority_owner
      - evaluation_hooks
    optional_entry_fields:
      - promotion_blockers
      - decomposition_required
      - decomposes_into
      - recommended_next_status
      - promotion_strategy
      - resolution_action
      - backlog_item_ref
      - example_refs
    consumed_by:
      - evaluation_validation
      - loop_or_finish
    cross_reference_requirements:
      - "source_node_id values should resolve to references/typed-source-node-index.yaml."
      - "If a source node is covered by references/typed-source-node-index.yaml, source_label, node_type, and scope_layer should stay aligned with that typed source entry."
      - "promotion_status must follow references/opml-promotion-status-model.json."
      - "backlog_item_ref must resolve to item_id values in references/opml-promotion-backlog.json when a source node still needs migration work."
      - "example_refs must resolve to example_id values in references/examples-index.json when the source node has a standard example mapping."

  - reference_id: opml_promotion_backlog
    file: references/opml-promotion-backlog.json
    format: json
    role: source_node_migration_backlog
    purpose: "Machine-readable prioritized backlog for promoting, splitting, renaming, deferring, or archiving source-derived candidate rules."
    required_top_level_fields:
