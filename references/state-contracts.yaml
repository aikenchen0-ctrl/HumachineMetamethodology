    insertion_after_state: demand_constraint_modeling
    purpose: "记录参数库。"
    required_top_level_fields:
      - parameters
      - parameter_types
      - ranges
      - relations

  - artifact_id: effect_library
    file: effect-library.json
    format: json
    insertion_after_state: demand_constraint_modeling
    purpose: "记录效应库。"
    required_top_level_fields:
      - effects
      - domains
      - applicability
      - cautions

  - artifact_id: temporary_library
    file: temporary-library.json
    format: json
    insertion_after_state: loop_or_finish
    purpose: "记录本轮临时术语、假设和中间变量。"
    required_top_level_fields:
      - temporary_terms
      - temporary_assumptions
      - temporary_variables

  - artifact_id: prompt_guidance
    file: prompt-guidance.json
    format: json
    insertion_after_state: semantic_clarification
    purpose: "记录引导用户、向用户提问的可复用提示。"
