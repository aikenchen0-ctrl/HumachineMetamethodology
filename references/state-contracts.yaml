contract_version: 1
skill_scope: problem-structuring-agentic-mvp
source_files:
  - scope-boundary.md
  - node-taxonomy.md
  - terminology-policy.md
  - metaPrompt.md
  - agentic-nested-state-machine.opml

source_mode_files:
  - references/core-method.md
  - references/advanced-mode.md
  - references/template-mode.md
  - references/output-and-evaluation.md
  - references/source-alignment-policy.md
  - references/screen-and-critique-mode.md
  - references/library-and-weighting-mode.md
  - references/orchestration-and-memory-mode.md
  - references/variant-and-composition-mode.md
  - references/traversal-and-invention-mode.md
  - references/discovery-and-hypothesis-mode.md
  - references/portfolio-and-optimization-mode.md
  - references/governance-and-feedback-mode.md
  - references/representation-and-serialization-mode.md

source_alignment:
  direct_source_reference:
    - metaPrompt.md
    - agentic-nested-state-machine.opml
  source_aligned_core_modes:
    - advanced_mode
    - template_mode
    - library_and_weighting_mode
    - orchestration_and_memory_mode
    - variant_and_composition_mode
    - traversal_and_invention_mode
    - discovery_and_hypothesis_mode
    - portfolio_and_optimization_mode
    - governance_and_feedback_mode
    - representation_and_serialization_mode
  source_aligned_orchestration_outputs:
    - orchestration-plan.json
    - execution-supervision.json
    - executor-interface.json
    - executor-capability-registry.json
    - memory-pruning.json
    - writeback-ledger.json
  derived_runtime_extension_outputs:
    - executor-runtime-hook.json
    - runtime-event-source-contract.json
    - runtime-event-source-registry.json
    - runtime-event-source-service-hook.json
    - runtime-schema-registry-hook.json
    - consumer-runtime-discovery.json
    - source-of-truth-drift-monitor.json
    - drift-monitor-scheduler.json
    - alert-delivery-contract.json
    - delivery-provider-capability-matrix.json
    - provider-health-check.json
    - provider-health-telemetry.json
    - provider-telemetry-stream-contract.json
    - channel-failover-policy.json
    - circuit-breaker-policy.json
    - adaptive-threshold-policy.json
    - threshold-governance-workflow.json
    - baseline-governance-service-hook.json
    - governance-source-drift-report.json
    - governance-review-scheduler.json
    - governance-provider-capability-matrix.json
  default_rule: "当任务是回到原始 source 对齐 skill 自身时，优先保留 source-aligned core；derived runtime extension 必须显式限域，不得因一般 orchestration 诉求自动激活。"

naming_policy:
  state_id_style: snake_case
  artifact_file_style: kebab-case
  required_artifact_formats:
    - json
    - yaml
    - xml
  note: "状态名面向流程，artifact 名面向文件系统；同一状态只绑定一个主产物文件。"

advanced_mode:
  activation_if:
    - "用户明确要求继续执行 metaPrompt 的步骤 3 到 8。"
    - "用户明确要求资源图、行动者网络图、流分析、SAFC、USIT32、TRIZ 或系统级解决方案集。"
    - "基础模式已完成 constraints-matrix，但仍无法直接求解，且问题明显需要深度系统建模。"
  note: "高级模式依附于基础六状态，不额外引入新的主状态。"

template_mode:
  activation_if:
    - "用户明确要求把当前方法转成模板或模板链。"
    - "用户明确要求变量映射、批量探索、共享上下文结构或收敛剪枝记录。"
    - "当前产物已经足够稳定，适合被压缩成可复用模板。"
  note: "模板模式依附于基础模式或高级模式产物，不额外引入新的主状态。"

library_and_weighting_mode:
  activation_if:
    - "用户明确要求参数库、效应库、临时库、名词变量、引导用户提示词、图格式选择或权重排序。"
    - "当前分析已经足够稳定，适合继续库化或做权重决策。"
    - "当前需要显式排序，但尚未给出人类权重，或需要记录权重来源与兜底方法。"
  note: "库与权重模式依附于基础模式、高级模式或模板模式产物。"

orchestration_and_memory_mode:
  activation_if:
    - "用户明确要求并行分支、并行、悬置遍历、执行监督、共享上下文或记忆剪枝。"
    - "当前问题需要正式定义分支类型和可见上下文范围。"
  note: "编排与记忆模式依附于已有分析产物，不额外引入新的主状态。"
  source_aligned_core_outputs:
    - orchestration-plan.json
    - execution-supervision.json
    - executor-interface.json
    - executor-capability-registry.json
    - memory-pruning.json
    - writeback-ledger.json
  derived_runtime_extension_only_if:
    - "当前任务明确涉及真实 runtime signal、外部 service hook、provider topology、持续 drift monitor 或长期治理运维。"
    - "不得因为用户只提到分支、共享文件、执行监督、反馈或治理，就自动扩展到 runtime/provider/governance 运维层。"

variant_and_composition_mode:
  activation_if:
    - "用户明确要求多个方案、步骤归一化、依赖修复或从多个方案中组合新方案。"
    - "当前输出已经不是单一路径，而是多个可比较替代项。"
  note: "方案变体与组合模式依附于 branch-plan 或 solution-set 产物。"

traversal_and_invention_mode:
  activation_if:
    - "用户明确要求微观发散遍历、启发式过滤、IFR、40个发明措施或措施联合体。"
    - "当前问题已经识别矛盾，但还需要系统化展开解空间。"
    - "用户明确要求适当剃刀、维度锚定、黑盒化，或强调要停留在正确维度上。"
  note: "遍历与发明模式依附于高级模式或基础模式的矛盾识别结果。"

discovery_and_hypothesis_mode:
  activation_if:
    - "用户明确要求保留开放性、反复确认、潜在需求发现、需求可见性塑造、场域创造需求、认知节能需求、需求不可见障碍、早期试用者信号或显式假设管理。"
    - "当前问题仍处于模糊现状与模糊目标状态之间，需要先做需求可见性与假设治理。"
    - "基础链路的 visible_demand / real_demand_hypothesis 已不足以承载潜在需求、可见性障碍或开放假设治理。"
  note: "发现与假设模式优先服务于语义澄清和需求约束建模。"

portfolio_and_optimization_mode:
  activation_if:
    - "用户明确要求五向接近最优、方法论分支、研究计划、执行计划或近似最优比较。"
    - "当前问题已经形成多目标、多路径、多约束的组合决策。"
    - "用户明确要求层次分析法、成对比较矩阵、人设权重优先或研究计划与执行计划分层。"
  note: "组合优化模式依附于基础模式、高级模式和库与权重模式产物。"

governance_and_feedback_mode:
  activation_if:
    - "用户明确要求人类可视修改、交互风格控制、覆盖权重规则或现实反馈闭环。"
    - "当前流程需要明确定义哪些节点允许人类覆盖。"
    - "用户明确要求选择式/启发式提问、人设权重优先，或要求无人输入时才回退自动权重。"
  note: "治理与反馈模式依附于现有分析和执行产物。"

representation_and_serialization_mode:
  activation_if:
    - "用户明确要求 xml、Mermaid、DAG、三元组或数学逻辑格式输出。"
    - "当前分析已经足够稳定，适合导出为特定表示层格式。"
    - "下游明确需要标签化输出、交互顺序图、依赖图、三元组压缩或逻辑条件表达。"
  note: "表示与序列化模式依附于已有分析产物，不替代主 artifact。"

artifact_catalog:
  - artifact_id: search_notes
    file: search-notes.json
    format: json
    owner_state: semantic_clarification
    purpose: "承接有界 first_search 的轻量证据、来源链接和未解决问题。该产物是可选的。"
    required_top_level_fields:
      - query_scope
      - sources
      - extracted_facts
      - unresolved_questions
      - search_status

  - artifact_id: intake_record
    file: intake-record.json
    format: json
    owner_state: problem_intake
    purpose: "记录用户原始请求和最小必要背景，作为后续所有状态的统一入口。"
    required_top_level_fields:
      - request_id
      - raw_request
      - task_mode
      - requester_stance
      - explicit_constraints
      - known_context
      - intake_gaps
      - intake_status

  - artifact_id: problem_brief
    file: problem-brief.json
    format: json
    owner_state: semantic_clarification
    purpose: "输出经澄清后的问题表达、术语映射和待补充问题。"
    required_top_level_fields:
      - normalized_problem
      - term_map
      - variable_map
      - clarification_mode
      - confirmation_loop_status
      - ambiguities
      - open_questions
      - clarified_scope
      - user_intent_hypothesis
      - clarification_status
    optional_top_level_fields:
      - visible_demand
      - real_demand_hypothesis
      - assumed_constraints
      - real_constraint_hypothesis

  - artifact_id: mode_resolution
    file: mode-resolution.json
    format: json
    owner_state: branch_plan_generation
    purpose: "记录基础模式之外已激活的扩展模式、激活理由、挂载阶段、必需产物，以及哪些派生运维产物因当前轮 scope 不匹配而被阻断。"
    required_top_level_fields:
      - resolved_modes
      - mode_sources
      - activation_reasons
      - source_alignment_basis
      - attach_after_states
      - required_outputs
      - optional_outputs
      - requested_outputs
      - blocked_outputs
      - source_aligned_core_outputs
      - blocked_derived_runtime_outputs
      - stage_requirements
      - dispatch_actions
      - scope_alignment_status
      - resolution_status

  - artifact_id: constraints_matrix
    file: constraints-matrix.json
    format: json
    owner_state: demand_constraint_modeling
    purpose: "输出最小问题模型，包含现状、目标、行动者、约束、资源和核心摩擦。"
    required_top_level_fields:
      - current_state
      - goal_state
      - system_profile
      - objective_function
      - survival_extremes
      - actors
      - actor_network_roles
      - actor_thresholds
      - constraints
      - authorization_boundaries
      - resources
      - frictions
      - harmful_functions
      - hidden_conditions
      - compensating_costs
      - assumptions
      - problem_formation_chain
      - excluded_scope
      - modeling_status
    optional_top_level_fields:
      - anti_goals
      - goal_state_uncertainties
      - visible_demand
      - real_demand_hypothesis
      - assumed_constraints
      - real_constraint_hypothesis

  - artifact_id: branch_plan
    file: branch-plan.json
    format: json
    owner_state: branch_plan_generation
    purpose: "把问题拆成可执行分支，并明确依赖、并行性和验证目标。"
    required_top_level_fields:
      - plan_id
      - planning_basis
      - mode_resolution_ref
      - shared_assumptions
      - branches
      - unresolved_couplings
      - recommended_execution_order
      - dag_view
      - triple_view
      - planning_status

  - artifact_id: evaluation_report
    file: evaluation-report.xml
    format: xml
    owner_state: evaluation_validation
    purpose: "对当前主产物做完整性、一致性和阻塞问题评估。"
    required_top_level_fields:
      - evaluation_id
      - checked_artifacts
      - completeness_score
      - consistency_score
      - blocking_issues
      - non_blocking_risks
      - recommended_action
      - recommended_loop_target
      - confidence
      - advanced_mode_findings
      - same_source_consistency
      - cross_format_consistency
      - fact_validation_chain
      - unverifiable_assumptions
      - mode_requirement_checks
      - missing_required_outputs
      - requested_output_status
      - scope_alignment_checks
      - scope_drift_findings
      - blocked_scope_expansions
      - stage_requirement_checks
      - missing_stage_outputs
      - dispatch_recommendations
    optional_top_level_fields:
      - key_step_role_checks
      - self_score
      - score_reason

  - artifact_id: loop_decision
    file: loop-decision.json
    format: json
    owner_state: loop_or_finish
    purpose: "给出本轮结束或回退的正式决策。"
    required_top_level_fields:
      - decision_id
      - decision
      - rationale
      - loop_target_state
      - required_repairs
      - final_artifact_set
      - stop_reason
      - next_action_summary
      - advanced_mode_status
      - unresolved_mode_requirements
      - scope_alignment_decision
      - scope_repair_target
      - stage_dispatch_target

library_artifact_catalog:
  - artifact_id: glossary
