advanced_rule_contracts:
  resource_scan_step:
    attach_after_state: demand_constraint_modeling
    inputs:
      - constraints-matrix.json
    optional_inputs:
      - search-notes.json
    outputs:
      - resource-graph.json
    optional_outputs:
      - resource-priority-policy.json
    rules:
      - "search-notes.json is bounded scan evidence and must not be treated as the resource graph itself."
      - "resource-graph.json is the structural output of discovered resources and must stay separate from scan-order narration."
      - "If the round declares explicit scan ordering or resource ranking, resource-priority-policy.json should record that policy and resource-graph.json should reference it rather than absorbing the whole rule."
    evaluation_hooks:
      - fact_validation_chain
      - same_source_consistency

orchestration_rule_contracts:
  shared_context_contract:
    attach_after_state: branch_plan_generation
    inputs:
      - orchestration-plan.json
    outputs:
      - shared-context-map.json
    optional_outputs:
      - execution-supervision.json
      - executor-interface.json
    rules:
      - "shared-context-map.json is the planning source for shared files, ownership, read scope, write scope, and synchronization notes."
      - "execution-supervision.json may refine coordination behavior, but it must not silently redefine shared ownership or read/write boundaries already declared in shared-context-map.json."
      - "executor-interface.json writable targets must stay inside the shared context contract."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

  write_scope_rule:
    attach_after_state: branch_plan_generation
    inputs:
      - shared-context-map.json
      - execution-supervision.json
      - executor-interface.json
    outputs:
      - execution-supervision.json
      - executor-interface.json
    optional_outputs:
      - writeback-ledger.json
    rules:
      - "execution-supervision.json shared_file_contracts and prohibited_cross_branch_writes must stay consistent with the ownership and write_scope declared in shared-context-map.json."
      - "executor-interface.json writable_targets must be a subset of the writable surface implied by shared-context-map.json and execution-supervision.json."
      - "expected_writebacks must only target artifacts or shared files that the declared write scope allows."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

  writeback_audit_rule:
    attach_after_state: loop_or_finish
    inputs:
      - execution-supervision.json
    optional_inputs:
      - shared-context-map.json
    optional_outputs:
      - writeback-ledger.json
    rules:
      - "If execution-supervision.json contains non-empty shared_file_contracts or checkpoint_writebacks, writeback-ledger.json must exist before finish."
      - "When shared-context-map.json exists, writeback-ledger.json should record which shared context contract and audited writeback surfaces it closes."
      - "merge_decisions and conflict_events must make shared-file coordination outcomes auditable instead of collapsing them into a final merged state only."
    evaluation_hooks:
      - fact_validation_chain
      - mode_interaction_checks

  execution_unit_contract:
    attach_after_state: branch_plan_generation
    inputs:
      - execution-supervision.json
      - executor-interface.json
    rules:
      - "executor-interface.json execution_units are the authoritative execution identities for the current round."
      - "execution-supervision.json assignment_units must map supervision targets to explicit execution units rather than to informal agent labels."
      - "executor_kind_bindings, required_capability_bindings, and completion_signals must be bound per execution unit."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

  worker_scope_contract:
    attach_after_state: branch_plan_generation
    inputs:
      - execution-supervision.json
      - executor-interface.json
    rules:
      - "execution-supervision.json worker_scopes define the bounded task scope, readable context, and prohibited writes for each execution unit."
      - "executor-interface.json unit_objectives, visibility_bindings, permission_bindings, writable_targets, and prohibited_targets must stay inside the declared worker scope."
      - "If two execution units differ materially in scope, that difference must be represented by worker_scopes and interface bindings rather than by informal role names."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

  reference_context_binding_rule:
    attach_after_state: branch_plan_generation
    inputs:
      - execution-supervision.json
      - executor-interface.json
    rules:
      - "execution-supervision.json reference_context_policy defines how upstream context is treated as reference material rather than freely rewritten memory."
      - "executor-interface.json reference_context_refs must point execution units to the reference context they may read without implying ownership of that context."
      - "resume_signals and checkpoint_hook_bindings must preserve continuity without collapsing reference context into mutable identity memory."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

  memory_pruning_rule:
    attach_after_state: loop_or_finish
    inputs:
      - memory-pruning.json
    rules:
      - "memory-pruning.json owns pruning decisions, suspended paths, reactivation conditions, memory_edit_targets, and replacement_summaries."
      - "pruned_paths and suspended_paths must be justified by pruning_reasons and prune_after_failed_rounds rather than by informal tool usage."
      - "replacement_summaries must preserve enough continuity for later reactivation without reintroducing the full discarded history."
    evaluation_hooks:
      - fact_validation_chain
      - mode_interaction_checks

  writeback_memory_edit_event:
    attach_after_state: loop_or_finish
    inputs:
      - writeback-ledger.json
    optional_inputs:
      - memory-pruning.json
    rules:
      - "writeback-ledger.json memory_edit_events are the authoritative audit trail for actual memory replacement or pruning writebacks."
      - "If memory-pruning.json names memory_edit_targets or replacement_summaries, writeback-ledger.json should record the corresponding memory_edit_events."
      - "memory_edit_events must not be collapsed into generic merge_decisions when history replacement materially changes future context."
    evaluation_hooks:
      - same_source_consistency
      - fact_validation_chain

  replacement_summary_rule:
    attach_after_state: loop_or_finish
    inputs:
      - memory-pruning.json
    optional_inputs:
      - writeback-ledger.json
    rules:
      - "replacement_summaries should preserve the kept conclusion, the discarded path identity, and the reactivation boundary."
      - "retained_summaries and replacement_summaries must stay consistent so later rounds do not lose why a path was cut and what remains reusable."
      - "If writeback-ledger.json records memory_edit_events, the replacement summary should be referentially aligned with those edits."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

library_rule_contracts:
  multiple_solution_sorting_rule:
    attach_after_state: branch_plan_generation
    inputs:
      - decision-weighting.json
    optional_inputs:
      - variant-set.json
      - branch-plan.json
      - override-policy.json
    rules:
      - "decision-weighting.json owns ranking semantics, criteria, derived weights, and ranking_result."
      - "ranking_scope or ranked_subjects_ref must bind ranking targets to stable branch ids or variant ids rather than display order."
      - "If variant-set.json exists, default_variant must follow the weighted ranking or explicit override basis instead of presentation order."
      - "Illustrative phrases and UI list position remain non-authoritative example residue."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

variant_rule_contracts:
  solution_list_artifact_boundary:
    attach_after_state: branch_plan_generation
    inputs:
      - variant-set.json
    optional_inputs:
      - decision-weighting.json
    rules:
      - "variant-set.json records comparable candidate variants and a default_variant pointer, but it does not compute ranking logic by itself."
      - "ranking_basis should point to a weighting artifact, optimization artifact, or explicit comparison basis rather than UI order or example numbering."
      - "When decision-weighting.json exists, variant-set.json should reference it through ranking_ref or default_selection_basis instead of restating the full ranking rule."
    evaluation_hooks:
      - same_source_consistency
      - mode_interaction_checks

mode_inference_signals:
  advanced_mode:
    - "当前对象是系统、流程或方法体系，而不是单个一步动作。"
    - "constraints-matrix.json 中 actors、frictions 与 hidden_conditions 已形成系统级张力。"
    - "branch-plan.json 中出现图建模、流分析、矛盾分析或系统级求解意图。"
  template_mode:
    - "branch-plan.json 或 solution-set.json 已形成可复用步骤链。"
    - "当前轮输出存在稳定 handoff 结构或显式变量映射需求。"
  library_and_weighting_mode:
    - "problem-brief.json 与 constraints-matrix.json 中已有稳定术语、参数或排序目标。"
    - "evaluation-report.xml 指出需要显式权重、排序依据或格式选择。"
    - "当前轮次仍缺权重来源、fallback weighting 或 ranking scope 的显式记录。"
  orchestration_and_memory_mode:
    - "branch-plan.json 中存在多个可并列处理的分支或多个不同执行单元。"
    - "branch-plan.json 中存在共享事实与局部假设需要隔离记录。"
    - "evaluation-report.xml 指出需要显式监督、挂起路径、异步协同或记忆剪枝。"
  variant_and_composition_mode:
    - "branch-plan.json 中存在两个及以上可比较替代路径。"
    - "多个方案共享实质相同步骤，适合归一化与重组。"
  traversal_and_invention_mode:
    - "constraints-matrix.json 或 contradiction-analysis.json 已识别主矛盾。"
    - "solution-set.json 仍缺系统化发散展开。"
    - "当前轮次仍缺显式的剃刀过滤、黑盒化规则或措施联合体解释。"
  discovery_and_hypothesis_mode:
    - "problem-brief.json 中 ambiguities、open_questions 或 confirmation_loop_status 显示问题仍不稳定。"
    - "需求形成机制仍依赖高不确定假设。"
    - "当前轮次仍缺 latent demand、visibility barriers 或可逆假设治理层。"
  portfolio_and_optimization_mode:
    - "branch-plan.json 或 solution-set.json 中存在多目标、多约束、多路径比较。"
    - "evaluation-report.xml 指出需要排序、路线图或近似最优比较。"
    - "当前轮次仍缺研究计划与执行计划分层，或缺显式权重方法与近似最优解释。"
  governance_and_feedback_mode:
    - "constraints-matrix.json 中存在授权边界、人工覆盖点或现实反馈闭环。"
    - "branch-plan.json 中包含审核、批准、升级或人工接管节点。"
    - "当前轮次存在 ranking 与人类指令的潜在冲突，但 override 优先级或覆盖范围尚未显式定义。"
    - "当前轮次仍缺显式提问风格、覆盖优先级或现实反馈回写台账。"
  representation_and_serialization_mode:
    - "branch-plan.json 已形成稳定 DAG 或交互顺序。"
    - "下游明确需要 XML、Mermaid、三元组或图格式导出。"
    - "当前轮次仍缺显式格式选择、导出目标映射或表示层选择理由。"

mode_resolution_policy:
  owner_state: branch_plan_generation
  required_fields:
    - resolved_modes
    - mode_sources
    - activation_reasons
    - source_alignment_basis
    - attach_after_states
    - required_outputs
    - optional_outputs
    - requested_outputs
    - blocked_outputs
    - source_aligned_core_outputs
    - blocked_derived_runtime_outputs
    - stage_requirements
    - dispatch_actions
    - scope_alignment_status
    - resolution_status
  rules:
    - "若当前轮存在 scope drift，则 stage_dispatch_target 默认优先回到 branch_plan_generation 或更早的 scope-definition 层，而不是继续扩展 downstream 运维产物。"
    - "若当前轮是 source alignment，则 mode-resolution.json 必须显式记录 source_alignment_basis、source_aligned_core_outputs、blocked_derived_runtime_outputs 与 scope_alignment_status。"
    - "若当前轮不涉及真实 runtime/service/provider/governance 运维目标，则 derived runtime extension 不得进入 required_outputs；若被点名但当前轮不生成，必须写入 blocked_outputs 与 blocked_derived_runtime_outputs。"
    - "当没有扩展模式被激活时，resolved_modes 允许为空数组，但 mode-resolution.json 仍应存在。"
    - "branch_plan_generation 必须同时检查用户显式要求与 mode_inference_signals，不得只依赖用户点名。"
    - "若某模式满足两条及以上系统推断信号，即使用户未点名也应激活，并把来源标记为 system_inference。"
    - "当某模式 activation_if 被满足时，必须把该模式写入 resolved_modes。"
    - "每个已激活模式都必须给出 activation_reasons。"
    - "每个已激活模式都必须给出 attach_after_states 与 required_outputs。"
    - "每个已激活模式都必须把自身对应的阶段要求展开写入 stage_requirements。"
    - "每个已激活模式都必须给出 dispatch_actions，至少说明阶段缺口对应的默认回退状态。"
    - "若用户显式点名某个原本 optional 的产物，则必须把它写入 requested_outputs，并同时提升到 required_outputs。"
    - "若当前轮是 source-aligned review，且请求的是 `critique-report.json` 这类高阶 review 产物，则可把它写入 requested_outputs 而不自动视为 advanced_mode 完成。"
    - "若某产物当前无法生成但用户要求了它，必须写入 blocked_outputs，并在 evaluation-report 中解释原因。"
    - "若两个及以上扩展模式同时激活，mode-resolution.json 应显式记录 mode_precedence、cross_mode_handoffs、authority_boundaries 与 interaction_notes。"
    - "若 library_and_weighting_mode 与 governance_and_feedback_mode 同时激活，则应显式记录 `decision-weighting.json -> override-policy.json` 的 handoff，且 authority_boundaries 必须表明人类 override 优先于自动 ranking。"
    - "若 library_and_weighting_mode 与 variant_and_composition_mode 同时激活，则应显式记录 `variant-set.json -> decision-weighting.json` 的候选集 handoff；若 default_variant 依赖排序结果，则还应显式记录 `decision-weighting.json -> variant-set.json` 的回写依据。"
    - "若 discovery_and_hypothesis_mode 与 governance_and_feedback_mode 同时激活，则应显式记录 `feedback-hooks.json -> feedback-ledger.json` 的 handoff。"
    - "若 representation_and_serialization_mode 与任一上游分析模式同时激活，则 authority_boundaries 必须表明表示层只序列化既有语义，不得发明新语义。"
    - "若两个及以上扩展模式同时激活，则 evaluation-report.xml 应优先包含 mode_interaction_checks，用于显式审查 handoff、authority boundary 与 cross-mode drift。"
    - "若 decision-weighting.json 用于多个候选方案排序，则 ranking_scope 或 ranked_subjects_ref 必须绑定稳定候选 id，不得使用显示顺序、方案编号措辞或示例位置作为排序依据。"

