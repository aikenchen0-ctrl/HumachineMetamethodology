stage_dispatch_policy:
  after_semantic_clarification:
    missing_route: semantic_clarification
  after_demand_constraint_modeling:
    missing_route: demand_constraint_modeling
  after_branch_plan_generation:
    missing_route: branch_plan_generation
  before_finish:
    missing_route: loop_or_finish
  rules:
    - "若当前轮存在 scope drift，则 stage_dispatch_target 默认优先回到 branch_plan_generation 或更早的 scope-definition 层，而不是继续扩展 downstream 运维产物。"
    - "若 missing_stage_outputs 在某个阶段非空，则 recommended_action 不能为 proceed。"
    - "若只有一个阶段存在缺口，则 stage_dispatch_target 取该阶段的 missing_route。"
    - "若多个阶段同时缺口，则 stage_dispatch_target 取最早阶段的 missing_route。"
    - "若缺口只涉及最终验收产物，则 stage_dispatch_target 取 loop_or_finish。"
    - "若缺口与阶段无法对应，则 stage_dispatch_target 默认取 recommended_loop_target；若后者为空，则默认取 evaluation_validation。"

orchestration_dispatch_rules:
  branch_classes:
    parallel_worker:
      use_when:
        - "同一问题定义。"
        - "不改变问题空间。"
        - "只是多个执行单元处理不同 todo。"
    parallel_branch:
      use_when:
        - "同一历史记忆。"
        - "允许修改约束或假设。"
        - "会进入不同问题空间。"
    suspended_traversal:
      use_when:
        - "当前证据不足。"
        - "路径暂时搁置而不是永久删除。"
    parallel_fork:
      use_when:
        - "不共享完整历史记忆。"
        - "未来不保证合并。"
    serial_branch:
      use_when:
        - "存在严格先后顺序的因果链任务。"
  rules:
    - "若当前轮是 source alignment，则默认先完成 source-aligned orchestration core，不得跳到 runtime/provider/governance 运维层。"
    - "若多个 todo 共享同一问题定义且只是在执行层拆分，则必须标记为 parallel_worker，而不是 parallel_branch。"
    - "若分支修改约束、假设或问题空间，则必须标记为 parallel_branch。"
    - "若路径只是暂时排除并允许未来恢复，则必须标记为 suspended_traversal，并在 memory-pruning.json 中写明恢复条件。"
    - "若路径不共享完整历史记忆且预期不整体合并，则必须标记为 parallel_fork。"
    - "若 orchestration-plan.json 中出现 parallel_worker、parallel_branch 或 parallel_fork，则 execution-supervision.json 必须存在。"
    - "若 execution-supervision.json 已存在，则 executor-interface.json 必须存在，并把每个 assignment_unit 压成显式 todo_packet。"
    - "若 executor-interface.json 已存在，则 executor-capability-registry.json 必须存在，并覆盖所有 executor_kind_bindings。"
    - "若 executor-capability-registry.json 已进入版本化、兼容性判断或将被外部执行器消费，则 executor-capability-version-policy.json 必须存在，并声明兼容窗口。"
    - "若需要动态发现执行器可用性、能力、上下文窗口或权限曲面，则 executor-capability-discovery.json 必须存在。"
    - "若 discovery 依赖 runtime 信号、外部探针或环境回调，则 executor-runtime-hook.json 必须存在。"
    - "若 runtime hook 依赖事件源定义、payload 契约或 replay 语义，则 runtime-event-source-contract.json 必须存在。"
    - "若 runtime event source 进入 source-of-truth 注册或 schema 版本化场景，则 runtime-event-source-registry.json 与 runtime-event-schema-version-policy.json 必须存在。"
    - "若 runtime event source、schema registry 或 consumer source-of-truth 通过真实 service 暴露，则对应 service hook 必须存在。"
    - "若 source-of-truth 需要持续 drift 监测，则 source-of-truth-drift-monitor.json 必须存在。"
    - "若 drift monitor 需要按周期、事件或节流规则运行，则 drift-monitor-scheduler.json 必须存在。"
    - "若 drift monitor 需要接入真实 scheduler，则 drift-scheduler-service-hook.json 必须存在。"
    - "若 orchestration-plan.json 中出现 suspended_traversal，或 memory-pruning.json 中存在 pruned_paths / suspended_paths，则 before_finish 前必须存在 memory-pruning.json。"
    - "若 shared_context_strategy 不是 none，则 execution-supervision.json 必须显式记录 context_visibility、worker_scopes 与 prohibited_cross_branch_writes。"
    - "若 shared_context_strategy 指向共享文件协同，或 execution-supervision.json 中存在非空 shared_file_contracts，则 branch_plan_generation 阶段必须先生成 shared-context-map.json。"
    - "若启用 orchestration_and_memory_mode，则执行节点必须把上游上下文视为 reference_context，而不是可任意改写的工作记忆。"
    - "若采用共享文件或环境变化协同，则 execution-supervision.json 必须显式记录 shared_file_contracts 与 environment_observation_rules。"
    - "若 shared-context-map.json 已存在，则 execution-supervision.json 与 executor-interface.json 不得越过其中声明的 ownership、read_scope 与 write_scope。"
    - "默认 direct_message_policy 为 disallowed；若允许直接通信，必须显式说明理由与边界。"
    - "若 todo 是由上游节点逐项分配的，则 execution-supervision.json 必须显式记录 todo_distribution_policy。"
    - "若分工依赖可见上下文范围或权限差异，则 execution-supervision.json 必须显式记录 visibility_classes 与 permission_classes。"
    - "executor-interface.json 必须显式记录 reference_context_refs、executor_kind_bindings、artifact_io_contracts、visibility_bindings、permission_bindings、writable_targets、expected_writebacks 与 completion_signals。"
    - "executor-interface.json 必须为每个 execution_unit 给出 failure_signals、resume_signals 与 checkpoint_hook_bindings。"
    - "若不同 execution_unit 对应不同执行器类型，则 executor-interface.json 必须显式区分 executor_kind_bindings，不得只写一个笼统 executor。"
    - "executor-interface.json 必须为每个 execution_unit 给出 required_capability_bindings 与 fallback_bindings。"
    - "executor-capability-registry.json 必须显式记录 capability_matrix、context_window_classes、permission_surfaces、unsupported_actions 与 fallback_routes。"
    - "executor-capability-registry.json 必须显式记录 registry_schema_version、registry_revision、compatibility_window 与 compatibility_mode。"
    - "executor-capability-version-policy.json 必须显式记录 supported_executor_interface_versions、deprecation_rules、compatibility_fallback_rules 与 migration_entrypoints。"
    - "executor-capability-discovery.json 必须显式记录 observed_capabilities、observed_availability、capability_gaps 与 update_candidates。"
    - "executor-runtime-hook.json 必须显式记录 signal_sources、probe_channels、expected_runtime_signals、signal_normalization_rules 与 hook_failure_routes。"
    - "若 executor-capability-discovery.json 已存在，则 capability-update-ledger.json 必须记录 applied_updates、rejected_updates、fallback_revisions 与 resulting_registry_state。"
    - "若 compatibility 需要基于 runtime consumer 请求或 probe 结果判断，则 consumer-compatibility-probe.json 必须记录 blocked_consumers、downgraded_consumers、selected_compatibility_routes 与 resulting_probe_state。"
    - "若 compatibility 需要基于 consumer source-of-truth 或 runtime consumer 识别判断，则 consumer-registry.json 必须记录 consumers、consumer_classes、known_requested_versions 与 downgrade_preferences。"
    - "若 compatibility probe 依赖运行时 consumer 识别，则 consumer-runtime-discovery.json 必须记录 observed_consumers、observed_requested_versions、consumer_identity_rules 与 unresolved_consumer_identities。"
    - "若 capability-update-ledger.json 改变了 registry version、compatibility_mode 或 deprecation_rules，则 capability-migration-ledger.json 必须记录 migration_steps、compatibility_checks 与 blocked_consumers。"
    - "runtime-event-source-registry.json 必须记录 source_of_truth、current_source_versions、supported_event_schema_versions 与 source_status。"
    - "runtime-event-schema-version-policy.json 必须记录 supported_payload_versions、field_coercion_rules、deprecation_rules 与 replay_compatibility_rules。"
    - "consumer-registry-version-policy.json 必须记录 consumer_identity_schema_version、supported_identity_formats、deprecation_rules 与 migration_entrypoints。"
    - "若 runtime event schema 发生变化，则 runtime-event-schema-migration-ledger.json 必须记录 field_mapping_changes、deprecated_event_fields 与 blocked_producers。"
    - "若 consumer source-of-truth 发生迁移，则 consumer-registry-migration-ledger.json 必须记录 identity_mapping_changes、deprecated_consumer_ids 与 blocked_consumers。"
    - "runtime-event-source-service-hook.json 必须记录 endpoint_profiles、discovery_queries、health_checks、source_registration_fields 与 failure_routes。"
    - "runtime-schema-registry-hook.json 必须记录 schema_subjects、version_queries、compatibility_queries、replay_queries 与 failure_routes。"
    - "consumer-registry-service-hook.json 必须记录 identity_lookup_keys、downgrade_lookup_fields、last_seen_queries 与 failure_routes。"
    - "若 service hook 与 registry/runtime observation 之间出现差异，则 source-of-truth-drift-report.json 必须记录 version_drifts、schema_drifts、identity_drifts、severity_per_drift 与 blocked_routes。"
    - "若 source-of-truth-drift-report.json 已存在，则 source-of-truth-reconciliation-ledger.json 必须记录 applied_reconciliations、rejected_reconciliations、fallback_revisions 与 resulting_source_of_truth_state。"
    - "source-of-truth-drift-monitor.json 必须记录 scan_triggers、scan_cadence、comparison_keys、severity_thresholds 与 pause_conditions。"
    - "drift-monitor-scheduler.json 必须记录 cadence、trigger_sources、throttle_rules、retry_intervals、maintenance_windows 与 pause_rules。"
    - "若允许自动修复，则 auto-reconcile-policy.json 必须记录 auto_apply_rules、human_review_gates、irreversible_blockers 与 rollback_rules。"
    - "若 drift 需要告警分发，则 alert-routing-policy.json 必须记录 severity_bands、routing_rules、delivery_channels、suppression_rules 与 ack_rules。"
    - "若告警需要通过真实投递通道发送，则 alert-delivery-contract.json 必须记录 payload_templates、severity_delivery_map、ack_callbacks 与 retry_profiles。"
    - "若告警或升级依赖多个 provider/多个通道，则 delivery-provider-capability-matrix.json 必须记录 channel_support、ack_support、retry_support、rate_limits 与 provider_status。"
    - "若存在主备 provider 或多通道回退，则 channel-failover-policy.json 必须记录 primary_providers、secondary_providers、failover_triggers、cooldown_rules 与 recovery_rules。"
    - "若 provider failover 依赖健康状态，则 provider-health-check.json 必须记录 health_endpoints、probe_rules、failure_thresholds、recovery_thresholds 与 status_mapping。"
    - "若 provider 健康需要基于时间窗遥测判断，则 provider-health-telemetry.json 必须记录 success_rates、latency_bands、error_rates、jitter_signals 与 derived_health_state。"
    - "若 provider 健康依赖持续遥测流，则 provider-telemetry-stream-contract.json 必须记录 metric_sources、sample_frequencies、aggregation_windows、missing_sample_policy 与 late_arrival_policy。"
    - "若需要熔断、半开恢复或回切，则 circuit-breaker-policy.json 必须记录 open_triggers、half_open_rules、close_rules、cooldown_windows 与 recovery_switch_rules。"
    - "若需要防抖和回差控制，则 circuit-breaker-hysteresis-policy.json 必须记录 open_thresholds、close_thresholds、debounce_windows、flapping_rules 与 suppression_rules。"
    - "若恢复判断依赖异常评分，则 anomaly-scoring-policy.json 必须记录 feature_weights、scoring_formula、severity_mapping 与 minimum_evidence。"
    - "若阈值需要自适应，则 adaptive-threshold-policy.json 必须记录 baseline_windows、update_rules、drift_adjustment_rules、freeze_conditions 与 rollback_conditions。"
    - "若遥测基线会长期演化，则 telemetry-baseline-evolution.json 必须记录 baseline_versions、seasonality_rules、drift_triggers 与 update_frequency。"
    - "若 blocking drift 进入人工路径，则 human-escalation-workflow.json 必须记录 escalation_levels、review_gates、responder_roles、response_slas 与 closure_conditions。"
    - "若人工升级需要接入真实通道，则 human-escalation-channel.json 必须记录 intake_modes、assignment_rules、ack_slas、closure_callbacks 与 fallback_channels。"
    - "若 drift monitor 实际触发扫描，则 drift-scan-ledger.json 必须记录 detected_drifts、actions_taken、skipped_actions、escalations 与 next_scan_plan。"
    - "若 delivery 或 escalation 发生 provider/channel failover，则 delivery-failover-ledger.json 必须记录 failover_events、attempted_providers、selected_providers、dropped_messages 与 resulting_delivery_state。"
    - "若 provider 从 unavailable 恢复并发生回切，则 provider-recovery-switch-ledger.json 必须记录 breaker_transitions、recovered_providers、switch_back_events 与 resulting_provider_state。"
    - "若 provider 恢复切回需要金丝雀放量，则 recovery-canary-policy.json 必须记录 initial_traffic_split、ramp_stages、observation_metrics、success_thresholds 与 rollback_triggers。"
    - "若阈值已根据遥测自适应更新、冻结或回滚，则 threshold-adaptation-ledger.json 必须记录 anomaly_scores、applied_threshold_updates、frozen_thresholds、rejected_updates 与 resulting_threshold_state。"
    - "若异常评分模型发生重标定，则 anomaly-model-recalibration.json 必须记录 old_feature_weights、new_feature_weights、feature_replacements、validation_checks 与 resulting_model_state。"
    - "若阈值治理进入长期审批或人工覆盖，则 threshold-governance-workflow.json 必须记录 governance_levels、approval_gates、override_roles、audit_requirements 与 rollback_authority。"
    - "若 threshold governance 发生批准、拒绝、冻结、覆盖或审计，则 threshold-governance-ledger.json 必须记录 approval_events、rejected_changes、frozen_controls、manual_overrides、audit_records 与 resulting_governance_state。"
    - "若长期治理依赖外部 baseline service，则 baseline-governance-service-hook.json 必须记录 baseline_queries、freeze_queries、version_queries 与 failure_routes。"
    - "若长期治理依赖外部 anomaly model registry，则 anomaly-model-registry.json 必须记录 model_versions、feature_sets、feature_weights、calibration_status 与 compatibility_windows。"
    - "若长期治理依赖外部 threshold policy registry，则 threshold-policy-registry.json 必须记录 threshold_versions、controlled_thresholds、approval_status、activation_windows 与 freeze_states。"
    - "若外部治理系统与本地治理状态发生同步，则 governance-sync-ledger.json 必须记录 sync_events、accepted_updates、rejected_updates、audit_deltas 与 resulting_governance_sync_state。"
    - "若外部治理 source 与本地治理状态发生 drift，则 governance-source-drift-report.json 必须记录 baseline_drifts、model_drifts、threshold_policy_drifts、severity_per_drift 与 blocked_governance_routes。"
    - "若治理 drift 进入修复或协调，则 governance-source-reconciliation-ledger.json 必须记录 applied_reconciliations、rejected_reconciliations、fallback_revisions 与 resulting_governance_source_state。"
    - "若长期治理需要接入外部审批通道，则 governance-approval-channel.json 必须记录 approval_callbacks、rejection_callbacks、escalation_routes、sla_profiles 与 closure_callbacks。"
    - "若长期治理需要持续审查调度，则 governance-review-scheduler.json 必须记录 cadence、trigger_sources、throttle_rules、maintenance_windows 与 pause_rules。"
    - "若治理 drift 需要专用告警路由，则 governance-alert-routing-policy.json 必须记录 severity_bands、routing_rules、delivery_channels、suppression_rules 与 ack_rules。"
    - "若治理审查存在固定周期或升级时点，则 governance-review-cadence.json 必须记录 review_cycles、review_windows、escalation_windows、freeze_windows 与 recheck_rules。"
    - "若治理审查已实际运行，则 governance-review-ops-ledger.json 必须记录 triggered_reviews、delivered_alerts、approval_events、escalations 与 next_review_plan。"
    - "若治理告警或审批依赖多个 provider/多个通道，则 governance-provider-capability-matrix.json 必须记录 channel_support、ack_support、retry_support、rate_limits 与 provider_status。"
    - "若治理告警或审批存在主备 provider，则 governance-channel-failover-policy.json 必须记录 primary_providers、secondary_providers、failover_triggers、cooldown_rules 与 recovery_rules。"
    - "若治理告警或审批发生 provider/channel failover，则 governance-delivery-failover-ledger.json 必须记录 failover_events、attempted_providers、selected_providers、dropped_messages 与 resulting_delivery_state。"
    - "若某 execution_unit 所需能力不在 capability_matrix 中，或权限/上下文窗口不满足，则不得直接 finish，必须走 fallback_bindings 或 escalation_routes。"
    - "若 execution-supervision.json 中定义了非空 checkpoint_writebacks、非空 shared_file_contracts 或非空 environment_observation_rules，则 loop_or_finish 前必须生成 writeback-ledger.json。"
    - "若共享文件协同已显式建模，则 writeback-ledger.json 应优先记录 source_shared_context_ref 与 audited_contracts。"
    - "writeback-ledger.json 必须记录 observed_writebacks、checkpoint_results、merge_decisions 与 final_shared_state。"

guard_definitions:
  enter_if:
    description: "进入状态所需满足的前置条件。"
  branch_if:
    description: "允许生成多分支计划的条件；只作用于 branch_plan_generation。"
  prune_if:
    description: "允许裁剪分支或回退问题空间的条件；默认由 evaluation_validation 提供依据。"
  loop_if:
    description: "当前状态不能安全推进，必须回退修补时触发。"
  done_if:
    description: "当前状态的主产物已满足进入下一状态的最小完成条件。"

branching_policy:
  owner_state: branch_plan_generation
  branch_if:
    - "从 constraints-matrix.json 中可识别出 2 个及以上可独立验证的子问题。"
    - "任意两个候选分支之间不存在未显式记录的控制依赖。"
    - "每个分支都能写出独立的 validation_target。"
    - "本轮 active branches 数量不超过 max_active_branches_per_round。"
  do_not_branch_if:
    - "不同候选分支共享同一个未解决前提。"
    - "分支只是同一句话的不同措辞，而不是不同任务。"
    - "拆分后任一分支无法单独验证。"
  output_requirement:
    - "所有分支必须写入 branch-plan.json。"
    - "每个分支必须包含 branch_id、goal、dependencies、parallelizable、validation_target。"
  note: "MVP 只做分支规划，不在状态机中展开 worker 执行。"

pruning_policy:
  owner_state: evaluation_validation
  prune_if:
    - "同一路径连续 2 次 revision 后没有新增证据或新增结构信息。"
    - "该路径对应的 completeness_score 或 consistency_score 连续低于阈值。"
    - "该路径依赖于已被判定失效的关键假设。"
    - "该路径与当前 clarified_scope 或 excluded_scope 明显冲突。"
  do_not_prune_if:
    - "只是暂时缺少证据，但尚未验证其无效。"
    - "该路径是唯一剩余可行方向。"
  prune_action:
    - "在 evaluation-report.xml 中显式记录被裁剪对象与裁剪理由。"
    - "在 loop-decision.json 中把裁剪结果转成 required_repairs 或 stop_reason。"

loop_policy:
  owner_state: loop_or_finish
  loop_if:
    - "evaluation-report.xml 的 recommended_action 为 loop_back。"
    - "存在 blocking_issues。"
    - "推荐回退目标状态已明确。"
  revise_in_place_if:
    - "问题不涉及状态边界重建，只需补齐字段、改写术语或修复计划依赖。"
  finish_if:
    - "recommended_action 为 proceed 或 stop。"
    - "blocking_issues 为空。"
    - "completeness_score 与 consistency_score 均达到阈值。"
    - "confidence 不低于 min_confidence_to_finish。"

states:
  - state_id: problem_intake
    enter_if:
      - "收到用户原始请求。"
    branch_if: []
    prune_if: []
    loop_if:
      - "raw_request 为空或只有无效占位文本。"
      - "无法判断 task_mode，且无法形成默认 multi_step 判定。"
      - "当前已知上下文过载，无法提取最小必要背景。"
    done_if:
      - "intake-record.json 已生成。"
      - "raw_request 非空。"
      - "task_mode 已判定。"
      - "intake_gaps 已显式记录。"
    next_on_done: semantic_clarification
    next_on_loop: problem_intake
    next_on_block: problem_intake

  - state_id: semantic_clarification
    enter_if:
      - "intake-record.json 存在。"
      - "intake_status 为 ready 或 needs_more_context。"
    branch_if: []
    prune_if: []
    loop_if:
      - "核心术语仍存在多义，且会改变后续建模方向。"
      - "normalized_problem 无法稳定形成。"
      - "用户意图假设过弱，无法支撑需求约束建模。"
      - "显性问题陈述与真实需求假设仍被混写，且会扭曲后续建模。"
    done_if:
      - "problem-brief.json 已生成。"
      - "normalized_problem 非空。"
      - "term_map 非空。"
      - "variable_map 已列出。"
      - "clarification_mode 已显式记录。"
      - "confirmation_loop_status 已显式记录。"
      - "clarification_status 为 ready。"
    next_on_done: demand_constraint_modeling
    next_on_loop: semantic_clarification
    next_on_block: semantic_clarification

  - state_id: demand_constraint_modeling
    enter_if:
      - "problem-brief.json 存在。"
      - "clarification_status 不是 blocked。"
    branch_if: []
    prune_if:
      - "某个假设与 clarified_scope 明显冲突。"
      - "某项约束不是可判断陈述，只是空泛口号。"
    loop_if:
      - "actors 无法识别。"
      - "constraints、resources、frictions 中任一核心字段为空。"
      - "goal_state 被错误写成具体实现方案。"
      - "goal_state 仍不稳定，但 anti-goals 或 survival extremes 尚未显式写出。"
    done_if:
      - "constraints-matrix.json 已生成。"
      - "current_state 与 goal_state 均已记录。"
      - "system_profile 已显式记录。"
      - "objective_function 已显式记录。"
      - "survival_extremes 已显式记录。"
      - "actors、constraints、resources、frictions 均非空。"
      - "actor_network_roles、actor_thresholds、harmful_functions、hidden_conditions、compensating_costs 已显式记录。"
      - "authorization_boundaries 已显式记录。"
      - "modeling_status 为 ready。"
    next_on_done: branch_plan_generation
    next_on_loop: semantic_clarification
    next_on_block: demand_constraint_modeling

  - state_id: branch_plan_generation
    enter_if:
      - "constraints-matrix.json 存在。"
      - "modeling_status 为 ready。"
    branch_if:
      - "满足 branching_policy.branch_if 的全部条件。"
    prune_if:
      - "某个候选分支没有独立 validation_target。"
      - "某个候选分支只是命名不同，实质重复。"
      - "某个候选分支依赖未被声明的上游结果。"
    loop_if:
      - "无法形成至少一个可执行分支。"
      - "recommended_execution_order 无法给出。"
      - "unresolved_couplings 过多，导致计划不可执行。"
    done_if:
      - "mode-resolution.json 已生成。"
      - "mode-resolution.json 已显式记录 stage_requirements 与 dispatch_actions。"
      - "branch-plan.json 已生成。"
      - "branches 非空。"
      - "每个分支都具备 goal、dependencies、validation_target。"
      - "dag_view 与 triple_view 已显式记录。"
      - "planning_status 为 ready 或 over_split。"
    next_on_done: evaluation_validation
    next_on_loop: demand_constraint_modeling
    next_on_block: branch_plan_generation

  - state_id: evaluation_validation
    enter_if:
      - "problem-brief.json、constraints-matrix.json、branch-plan.json 均存在。"
      - "mode-resolution.json 存在。"
    branch_if: []
    prune_if:
      - "满足 pruning_policy.prune_if 的任一条件。"
    loop_if:
      - "checked_artifacts 不完整。"
      - "completeness_score 低于 min_completeness_to_proceed。"
      - "consistency_score 低于 min_consistency_to_proceed。"
      - "blocking_issues 非空。"
      - "missing_required_outputs 非空。"
      - "missing_stage_outputs 非空。"
      - "recommended_action 为 revise 或 loop_back。"
    done_if:
      - "evaluation-report.xml 已生成。"
      - "recommended_action 已给出。"
      - "blocking_issues 已显式记录。"
      - "same_source_consistency、cross_format_consistency、fact_validation_chain、unverifiable_assumptions 已显式记录。"
      - "mode_requirement_checks、missing_required_outputs、requested_output_status 已显式记录。"
      - "stage_requirement_checks、missing_stage_outputs、dispatch_recommendations 已显式记录。"
      - "scope_alignment_checks、scope_drift_findings、blocked_scope_expansions 已显式记录。"
    next_on_done: loop_or_finish
    next_on_loop: loop_or_finish
    next_on_block: evaluation_validation

  - state_id: loop_or_finish
    enter_if:
      - "evaluation-report.xml 存在。"
    branch_if: []
    prune_if:
      - "根据 evaluation-report.xml 中的 blocking_issues 与 recommended_loop_target，丢弃已判定无效的路径。"
    loop_if:
      - "decision 为 loop。"
      - "decision 为 revise_in_place。"
    done_if:
      - "loop-decision.json 已生成。"
      - "decision 已确定。"
      - "若 decision 为 loop，则 loop_target_state 非空。"
      - "若 decision 为 finish，则 blocking_issues 为空。"
      - "advanced_mode_status 已显式记录。"
      - "unresolved_mode_requirements 已显式记录。"
      - "stage_dispatch_target 已显式记录。"
      - "scope_alignment_decision 与 scope_repair_target 已显式记录。"
    next_on_done:
      finish_if: finish
      loop_if: dynamic_loop_target
      revise_if: dynamic_loop_target
    next_on_loop: dynamic_loop_target
    next_on_block: loop_or_finish

transitions:
  - from: problem_intake
    to: semantic_clarification
    when:
      - "problem_intake.done_if 全部满足。"
    effect:
      - "开始问题去歧义与术语重写。"

  - from: semantic_clarification
    to: demand_constraint_modeling
    when:
      - "semantic_clarification.done_if 全部满足。"
    effect:
      - "开始构造最小问题模型。"

  - from: semantic_clarification
    to: problem_intake
    when:
      - "semantic_clarification.loop_if 中与用户意图或原始问题缺失相关的条件成立。"
    effect:
      - "回退补齐原始问题和立场信息。"

  - from: demand_constraint_modeling
    to: branch_plan_generation
    when:
      - "demand_constraint_modeling.done_if 全部满足。"
    effect:
      - "开始拆分任务并生成分支计划。"

  - from: demand_constraint_modeling
    to: semantic_clarification
    when:
      - "目标状态、术语边界或纳入范围需要重写。"
    effect:
      - "回退修复问题表达。"

  - from: branch_plan_generation
    to: evaluation_validation
    when:
      - "branch_plan_generation.done_if 全部满足。"
    effect:
      - "对分支计划做完整性和一致性评估。"

  - from: branch_plan_generation
    to: demand_constraint_modeling
    when:
      - "branch_plan_generation.loop_if 任一条件成立。"
    effect:
      - "回退修复约束模型或重新拆分问题。"

  - from: evaluation_validation
    to: loop_or_finish
    when:
      - "evaluation_validation.done_if 全部满足。"
    effect:
      - "根据评估报告作出正式决策。"

  - from: loop_or_finish
    to: problem_intake
    when:
      - "decision 为 loop 且 loop_target_state == problem_intake。"
    effect:
      - "回到入口重收问题。"

  - from: loop_or_finish
    to: semantic_clarification
    when:
      - "decision 为 loop 且 loop_target_state == semantic_clarification。"
      - "或 stage_dispatch_target == semantic_clarification。"
    effect:
      - "回到语义澄清。"

  - from: loop_or_finish
    to: demand_constraint_modeling
    when:
      - "decision 为 loop 且 loop_target_state == demand_constraint_modeling。"
      - "或 stage_dispatch_target == demand_constraint_modeling。"
    effect:
      - "回到需求约束建模。"

  - from: loop_or_finish
    to: branch_plan_generation
    when:
      - "decision 为 loop 且 loop_target_state == branch_plan_generation。"
      - "或 decision 为 revise_in_place 且修复内容仅涉及分支计划。"
      - "或 stage_dispatch_target == branch_plan_generation。"
    effect:
      - "回到分支计划生成。"

  - from: loop_or_finish
    to: evaluation_validation
    when:
      - "decision 为 revise_in_place 且修复内容仅涉及评估依据补全。"
      - "或 stage_dispatch_target == evaluation_validation。"
    effect:
      - "重新评估，不重建上游模型。"

  - from: loop_or_finish
    to: finish
    when:
      - "decision 为 finish。"
      - "blocking_issues 为空。"
      - "missing_required_outputs 为空。"
      - "missing_stage_outputs 为空。"
      - "unresolved_mode_requirements 为空。"
      - "completeness_score 与 consistency_score 均达到阈值。"
      - "confidence 不低于 min_confidence_to_finish。"
      - "scope_alignment_decision 为 aligned 或 not_applicable。"
    effect:
      - "结束本轮状态机。"

dynamic_routing_rules:
  - "dynamic_loop_target 只能取 problem_intake、semantic_clarification、demand_constraint_modeling、branch_plan_generation、evaluation_validation 之一。"
  - "若存在 stage_dispatch_target，则优先按 stage_dispatch_target 路由，再回退到 loop_target_state。"
  - "若 recommended_loop_target 为空，则默认回退到 evaluation_validation 的直接上游状态。"
  - "若同一问题连续 3 次回退到同一状态仍无实质修复，则应触发 stop 审查，而不是无限循环。"
