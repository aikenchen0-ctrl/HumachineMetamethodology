machine_version: 1
machine_id: hmm-mvp
source_contract: state-contracts.yaml
source_policy: terminology-policy.md
source_alignment_policy: references/source-alignment-policy.md
source_advanced_mode: references/advanced-mode.md
source_screen_critique_mode: references/screen-and-critique-mode.md
source_template_mode: references/template-mode.md
source_library_mode: references/library-and-weighting-mode.md
source_orchestration_mode: references/orchestration-and-memory-mode.md
source_variant_mode: references/variant-and-composition-mode.md
source_traversal_mode: references/traversal-and-invention-mode.md
source_discovery_mode: references/discovery-and-hypothesis-mode.md
source_portfolio_mode: references/portfolio-and-optimization-mode.md
source_governance_mode: references/governance-and-feedback-mode.md
source_representation_mode: references/representation-and-serialization-mode.md

start_state: problem_intake
terminal_states:
  - finish

design_notes:
  - "MVP 状态机保持单主线推进，不在状态机内部直接展开并行执行。"
  - "分支只在 branch_plan_generation 中被定义为计划对象，不被当作新的状态节点。"
  - "回退优先回到最早出错且修复成本最低的状态。"
  - "若 advanced mode 被激活，则基础主线不变，但 finish 前需要额外产出高级产物链。"
  - "当前六状态 shell 不是 source scaffold 本体，而是对 chapter-based metaPrompt v2 主链的运行时压缩视图。"

global_thresholds:
  min_completeness_to_proceed: 70
  min_consistency_to_proceed: 70
  min_confidence_to_finish: 0.60
  max_failed_revision_cycles: 3
  max_active_branches_per_round: 3

global_invariants:
  - "任意时刻只允许一个主状态处于运行中。"
  - "所有状态迁移都必须以显式 artifact 或显式判断为依据，不允许仅凭隐式语义跳转。"
  - "若上游主产物不存在，则禁止进入下游状态。"
  - "若评估报告中仍有 blocking_issues，则禁止进入 finish。"
  - "MVP 中的 branch_plan 只能作为计划，不作为执行结果。"
  - "若 advanced mode 被激活，则 solution-set.json 不存在时禁止进入 finish。"
  - "若任一扩展模式被激活，则必须存在 mode-resolution.json。"
  - "若 evaluation-report.xml 中 missing_required_outputs 非空，则禁止进入 finish。"
  - "若 evaluation-report.xml 使用 self_score，则必须同时给出 score_reason，且 self_score 不得替代 same_source_consistency、cross_format_consistency 或 fact_validation_chain。"

source_alignment_rules:
  - "当当前轮任务明确是对齐 metaPrompt.md 或 agentic-nested-state-machine.opml 时，默认只激活 source-aligned core。"
  - "metaPrompt v2 的 chapter 4 到 chapter 11 是 maintained source mainline；当前六状态 shell 只是其运行时压缩。"
  - "在 source alignment 轮次中，orchestration_and_memory_mode 不再被视为默认 core；只有当前轮明确需要协调、共享上下文或记忆剪枝时，才允许以 source-aligned subset 方式激活。"
  - "runtime/provider/governance 运维层 artifact 属于 derived runtime extension，不得因为一般分支、共享文件、执行监督或治理诉求自动激活。"
  - "只有当前任务明确涉及真实 runtime signal、外部 service hook、provider topology、持续 drift monitor 或长期治理运维时，derived runtime extension 才允许进入 required_outputs。"

core_workflow_shell:
  owner_layer: source_aligned_core
  maintained_source_structure: chapter_based_metaPrompt_v2
  maintained_source_mainline_chapters:
    - chapter_04_task_entry_and_clarification
    - chapter_05_problem_modeling
    - chapter_06_state_constraints_ifr
    - chapter_07_resources_and_system_levels
    - chapter_08_retrieval_and_evidence_writeback
    - chapter_09_generation
    - chapter_10_evaluation_and_implementation
    - chapter_11_pluginization_and_self_upgrade
  shell_is_runtime_compression: true
  states:
    - problem_intake
    - semantic_clarification
    - demand_constraint_modeling
    - branch_plan_generation
    - evaluation_validation
    - loop_or_finish
  terminal_states:
    - finish
  primary_transition_chain:
    - problem_intake->semantic_clarification
    - semantic_clarification->demand_constraint_modeling
    - demand_constraint_modeling->branch_plan_generation
    - branch_plan_generation->evaluation_validation
    - evaluation_validation->loop_or_finish
    - loop_or_finish->finish_or_loopback
  shell_artifacts:
    - intake-record.json
    - problem-brief.json
    - constraints-matrix.json
    - branch-plan.json
    - evaluation-report.xml
    - loop-decision.json
  shell_rules:
    - "branch_plan_generation is the last core planning state; branch classes remain plan objects rather than workflow states."
    - "evaluation_validation audits coherence and required outputs before any finish decision."
    - "loop_or_finish owns loop routing and finish gating; it does not redefine upstream modeling artifacts."
    - "The shell remains the same whether or not extension modes are active."
    - "chapter 8 retrieval and chapter 11 pluginization are first-class source layers even when they are not represented as dedicated top states in the runtime shell."

source_first_class_conditional_layers:
  - retrieval_and_evidence_writeback
  - resource_and_system_level_expansion
  - candidate_generation
  - implementation_shaping
  - pluginization_and_self_upgrade

source_grounded_non_default_expansion_planes:
  - orchestration_and_memory_mode

core_extension_boundary:
  separation_rules:
    - "parallel_branch, parallel_worker, serial_branch, suspended_traversal, and parallel_fork belong to orchestration branch classes rather than the core state chain."
    - "shared-context-map.json, orchestration-plan.json, execution-supervision.json, executor-interface.json, executor-capability-registry.json, memory-pruning.json, and writeback-ledger.json are extension artifacts attached around the shell."
    - "runtime/provider/governance operations remain derived extensions and do not become part of the core workflow shell by default."

advanced_mode:
  activation_if:
    - "用户明确要求 metaPrompt v2 中第 7 到第 10 章对应的深层建模与求解扩展。"
    - "用户明确要求资源图、行动者网络图、功能物场、流分析、SAFC、USIT32 或解决方案集。"
    - "当前问题已经完成基础结构化，但仍需要系统级建模。"
    - "当前问题已经明确是系统问题，且仅靠 constraints-matrix 无法支撑后续求解。"
  sequence:
    - resource-graph.json
    - actor-network.json
    - function-field-model.json
    - flow-analysis.json
    - safc-model.json
    - contradiction-analysis.json
    - solution-set.json
  optional_outputs:
    - resource-priority-policy.json
    - multi-screen-analysis.json
  finish_guard_when_active:
    - "至少一个深度系统模型已生成。"
    - "solution-set.json 已生成。"
    - "关键矛盾或关键阻滞点已显式记录。"
    - "critique-report.json 已生成。"
    - "loop-decision.json 中 advanced_mode_status 不能是 incomplete。"

template_mode:
  activation_if:
    - "用户明确要求模板链、变量映射、批量探索、收敛剪枝记录或共享上下文结构。"
    - "当前方法已经稳定到可以复用，且后续任务需要重复应用同一分析链。"
  optional_outputs:
    - template-chain.json
    - pruning-notes.json
  finish_guard_when_active:
    - "若已声明启用 template mode，则至少应生成 template-chain.json。"

library_and_weighting_mode:
  activation_if:
    - "用户明确要求名词变量、参数库、效应库、临时库、提示引导、图格式选择或权重排序。"
    - "当前分析已经产生稳定术语、参数或多方案排序需求，适合继续库化或显式求权重。"
    - "当前需要显式排序，但尚未给出人类权重，或需要记录权重来源与兜底方法。"
  optional_outputs:
    - glossary.json
    - parameter-library.json
    - effect-library.json
    - temporary-library.json
    - prompt-guidance.json
    - graph-format-selection.json
    - checklist-summary.json
    - decision-weighting.json
  finish_guard_when_active:
    - "若已声明启用 library and weighting mode，则至少应生成一个库化或权重产物。"

orchestration_and_memory_mode:
  activation_if:
    - "用户明确要求分支类型设计、执行监督、共享上下文或记忆剪枝。"
    - "当前问题已经进入多分支或多执行路径阶段，需要正式定义并行/串行/挂起与可见上下文范围。"
  optional_outputs:
    - orchestration-plan.json
    - shared-context-map.json
    - execution-supervision.json
    - executor-interface.json
    - executor-capability-registry.json
    - executor-capability-version-policy.json
    - executor-capability-discovery.json
    - executor-runtime-hook.json
    - runtime-event-source-contract.json
    - runtime-event-source-registry.json
    - runtime-event-schema-version-policy.json
    - runtime-event-source-service-hook.json
    - runtime-schema-registry-hook.json
    - memory-pruning.json
    - writeback-ledger.json
    - capability-update-ledger.json
    - consumer-compatibility-probe.json
    - consumer-registry.json
    - consumer-registry-version-policy.json
    - consumer-runtime-discovery.json
    - consumer-registry-service-hook.json
    - capability-migration-ledger.json
    - runtime-event-schema-migration-ledger.json
    - consumer-registry-migration-ledger.json
    - source-of-truth-drift-report.json
    - source-of-truth-reconciliation-ledger.json
    - source-of-truth-drift-monitor.json
    - drift-monitor-scheduler.json
    - drift-scheduler-service-hook.json
    - auto-reconcile-policy.json
    - alert-routing-policy.json
    - alert-delivery-contract.json
    - delivery-provider-capability-matrix.json
    - provider-health-check.json
    - provider-health-telemetry.json
    - provider-telemetry-stream-contract.json
    - channel-failover-policy.json
    - circuit-breaker-policy.json
    - circuit-breaker-hysteresis-policy.json
    - anomaly-scoring-policy.json
    - adaptive-threshold-policy.json
    - telemetry-baseline-evolution.json
    - human-escalation-workflow.json
    - human-escalation-channel.json
    - drift-scan-ledger.json
    - delivery-failover-ledger.json
    - provider-recovery-switch-ledger.json
    - recovery-canary-policy.json
    - threshold-adaptation-ledger.json
    - anomaly-model-recalibration.json
    - threshold-governance-workflow.json
    - threshold-governance-ledger.json
    - baseline-governance-service-hook.json
    - anomaly-model-registry.json
    - threshold-policy-registry.json
    - governance-sync-ledger.json
    - governance-source-drift-report.json
    - governance-source-reconciliation-ledger.json
    - governance-approval-channel.json
    - governance-review-scheduler.json
    - governance-alert-routing-policy.json
    - governance-review-cadence.json
    - governance-review-ops-ledger.json
    - governance-provider-capability-matrix.json
    - governance-channel-failover-policy.json
    - governance-delivery-failover-ledger.json
  finish_guard_when_active:
    - "若已声明启用 orchestration and memory mode，则 orchestration-plan.json 已生成。"
    - "若已声明启用 orchestration and memory mode，则 execution-supervision.json 已生成。"
    - "若已声明启用 orchestration and memory mode，则 executor-interface.json 已生成。"
    - "若已声明启用 orchestration and memory mode，则 executor-capability-registry.json 已生成。"
    - "若 capability registry 进入版本化、兼容性判断或外部消费场景，则 executor-capability-version-policy.json 已生成。"
    - "若存在挂起路径、剪枝路径或平行分叉，则 memory-pruning.json 已生成。"
    - "若 execution-supervision.json 中存在非空 shared_file_contracts、非空 environment_observation_rules 或非空 checkpoint_writebacks，则 writeback-ledger.json 已生成。"
    - "若 executor-capability-discovery.json 已生成，则 capability-update-ledger.json 已生成。"
    - "若 capability discovery 依赖 runtime 信号，则 executor-runtime-hook.json 已生成。"
    - "若 runtime hook 依赖事件源契约，则 runtime-event-source-contract.json 已生成。"
    - "若 runtime source 进入 source-of-truth 注册或 schema 版本化场景，则 runtime-event-source-registry.json 与 runtime-event-schema-version-policy.json 已生成。"
    - "若 runtime source、schema registry 或 consumer source-of-truth 通过真实 service 暴露，则对应 service hook 已生成。"
    - "若存在 consumer 版本探测或兼容性断裂判断，则 consumer-compatibility-probe.json 已生成。"
    - "若 compatibility 依赖 consumer source-of-truth 或 runtime consumer 识别，则 consumer-registry.json 与 consumer-runtime-discovery.json 已生成。"
    - "若 consumer source-of-truth 进入版本化或 identity schema 迁移场景，则 consumer-registry-version-policy.json 已生成。"
    - "若 capability-update-ledger.json 中发生版本变更、兼容性破坏或弃用绑定，则 capability-migration-ledger.json 已生成。"
    - "若 runtime event schema 发生版本变化、字段弃用或兼容断裂，则 runtime-event-schema-migration-ledger.json 已生成。"
    - "若 consumer registry 发生版本变化、identity mapping 变化或 consumer id 弃用，则 consumer-registry-migration-ledger.json 已生成。"
    - "若比较 service/source registry/runtime observation 后存在 drift，则 source-of-truth-drift-report.json 已生成。"
    - "若 drift 进入修复或 reconciliation 路径，则 source-of-truth-reconciliation-ledger.json 已生成。"
    - "若需要持续 drift 监测，则 source-of-truth-drift-monitor.json 已生成。"
    - "若 drift monitor 需要调度运行，则 drift-monitor-scheduler.json 已生成。"
    - "若 drift monitor 需要接入真实 scheduler，则 drift-scheduler-service-hook.json 已生成。"
    - "若允许 auto reconcile，则 auto-reconcile-policy.json 已生成。"
    - "若 drift 需要告警分发，则 alert-routing-policy.json 已生成。"
    - "若告警需要接入真实投递通道，则 alert-delivery-contract.json 已生成。"
    - "若告警或升级依赖多个 provider/多个通道，则 delivery-provider-capability-matrix.json 与 channel-failover-policy.json 已生成。"
    - "若 provider failover 依赖健康状态，则 provider-health-check.json 已生成。"
    - "若 provider 健康需要以遥测窗口而不是单点探测判断，则 provider-health-telemetry.json 已生成。"
    - "若 provider 健康依赖持续遥测流，则 provider-telemetry-stream-contract.json 已生成。"
    - "若 provider failover 需要熔断/恢复切回，则 circuit-breaker-policy.json 已生成。"
    - "若需要防抖、回差和防止频繁开闭，则 circuit-breaker-hysteresis-policy.json 已生成。"
    - "若需要基于遥测做异常评分，则 anomaly-scoring-policy.json 已生成。"
    - "若阈值需要随基线漂移自适应，则 adaptive-threshold-policy.json 已生成。"
    - "若遥测基线会长期演化，则 telemetry-baseline-evolution.json 已生成。"
    - "若 drift 需要人工审核闸门，则 human-escalation-workflow.json 已生成。"
    - "若人工审核需要接入真实升级通道，则 human-escalation-channel.json 已生成。"
    - "若 drift monitor 已实际触发扫描，则 drift-scan-ledger.json 已生成。"
    - "若发生 provider 或 channel failover，则 delivery-failover-ledger.json 已生成。"
    - "若 provider 发生恢复切回，则 provider-recovery-switch-ledger.json 已生成。"
    - "若 provider 恢复切回需要金丝雀放量，则 recovery-canary-policy.json 已生成。"
    - "若已执行阈值自适应或冻结/回滚，则 threshold-adaptation-ledger.json 已生成。"
    - "若异常评分模型发生重标定，则 anomaly-model-recalibration.json 已生成。"
    - "若阈值治理进入审批、冻结、覆盖或审计流程，则 threshold-governance-workflow.json 与 threshold-governance-ledger.json 已生成。"
    - "若长期治理依赖外部 baseline service、anomaly model registry 或 threshold policy registry，则对应治理 source-of-truth 契约已生成。"
    - "若外部治理系统与本地治理状态发生同步，则 governance-sync-ledger.json 已生成。"
    - "若外部治理 source 与本地治理状态之间发生 drift，则 governance-source-drift-report.json 已生成。"
    - "若治理 drift 进入修复路径，则 governance-source-reconciliation-ledger.json 已生成。"
    - "若长期治理需要接入外部审批通道，则 governance-approval-channel.json 已生成。"
    - "若已执行外部治理同步，则 governance-sync-ledger.json 已生成。"
    - "若长期治理需要持续审查调度，则 governance-review-scheduler.json 与 governance-review-cadence.json 已生成。"
    - "若治理 drift 需要专用告警路由，则 governance-alert-routing-policy.json 已生成。"
    - "若治理审查已实际运行，则 governance-review-ops-ledger.json 已生成。"
    - "若治理告警或审批依赖多个 provider/多个通道，则 governance-provider-capability-matrix.json 与 governance-channel-failover-policy.json 已生成。"
    - "若治理告警或审批发生 provider/channel failover，则 governance-delivery-failover-ledger.json 已生成。"

variant_and_composition_mode:
  activation_if:
    - "用户明确要求多个方案变体、步骤规范化或方案重组。"
    - "当前输出已经形成两个及以上可比较替代项，且存在共享步骤或可重组步骤。"
  optional_outputs:
    - variant-set.json
    - step-normalization.json
    - composition-plan.json
  finish_guard_when_active:
    - "若已声明启用 variant and composition mode，则至少应生成 variant-set.json 或 composition-plan.json。"

traversal_and_invention_mode:
  activation_if:
    - "用户明确要求微观发散遍历、IFR、启发式过滤、40个发明措施或措施联合体。"
    - "当前问题已经识别出主矛盾，但仍缺系统化解空间展开。"
    - "用户明确要求适当剃刀、维度锚定、黑盒化，或强调要停留在正确维度上。"
  optional_outputs:
    - traversal-plan.json
    - heuristic-filters.json
    - invention-measures.json
    - measure-combinations.json
  finish_guard_when_active:
    - "若已声明启用 traversal and invention mode，则至少应生成 traversal-plan.json 或 invention-measures.json。"

discovery_and_hypothesis_mode:
  activation_if:
    - "用户明确要求潜在需求发现、需求可见性塑造、场域创造需求、认知节能需求、需求不可见障碍、早期试用者信号、开放澄清模式、软剪枝或现实反馈钩子。"
    - "当前问题仍处于模糊现状与模糊目标状态之间，需要先做需求可见性和假设治理。"
    - "基础链路的 visible_demand / real_demand_hypothesis 已不足以承载潜在需求、可见性障碍或开放假设治理。"
  optional_outputs:
    - demand-visibility.json
    - hypothesis-register.json
    - feedback-hooks.json
  finish_guard_when_active:
    - "若已声明启用 discovery and hypothesis mode，则至少应生成 demand-visibility.json 或 hypothesis-register.json。"

portfolio_and_optimization_mode:
  activation_if:
    - "用户明确要求方法论分支、近似最优比较、状态空间矩阵、研究计划或执行路线图。"
    - "当前问题已经形成多目标、多路径、多约束的组合决策，需要显式比较近似最优。"
    - "用户明确要求五向接近最优、层次分析法、成对比较矩阵，或要求研究计划与执行计划分层。"
  optional_outputs:
    - state-space-matrix.json
    - methodology-portfolio.json
    - method-branch-map.json
    - research-plan.json
    - execution-roadmap.json
    - optimization-report.json
  finish_guard_when_active:
    - "若已声明启用 portfolio and optimization mode，则至少应生成 methodology-portfolio.json 或 optimization-report.json。"

governance_and_feedback_mode:
  activation_if:
    - "用户明确要求人类可视修改、覆盖规则、交互风格或现实反馈台账。"
    - "当前流程包含明确的人类审核点、覆盖点或现实世界反馈回写需求。"
    - "用户明确要求选择式/启发式提问、人设权重优先，或要求无人输入时才回退自动权重。"
    - "已存在 ranking/weighting 结果，但还需要显式定义人类覆盖它的优先级和作用范围。"
  optional_outputs:
    - interaction-policy.json
    - governance-checkpoints.json
    - override-policy.json
    - feedback-ledger.json
  finish_guard_when_active:
    - "若已声明启用 governance and feedback mode，则至少应生成 interaction-policy.json 或 governance-checkpoints.json 或 override-policy.json 或 feedback-ledger.json。"

representation_and_serialization_mode:
  activation_if:
    - "用户明确要求 xml、Mermaid、DAG、三元组或数学逻辑格式导出。"
    - "当前分析结果已经足够稳定，且下一步需要以特定表示层格式被其他步骤消费。"
    - "下游明确需要标签化输出、交互顺序图、依赖图、三元组压缩或逻辑条件表达。"
  optional_outputs:
    - xml-rewrite.xml
    - sequence-diagram.mmd
    - representation-bundle.json
  finish_guard_when_active:
    - "若已声明启用 representation and serialization mode，则至少应生成 xml-rewrite.xml 或 representation-bundle.json。"

mode_attachment_rules:
  advanced_mode:
    activation_check_state: semantic_clarification
    attach_after_states:
      - demand_constraint_modeling
      - branch_plan_generation
      - evaluation_validation
      - loop_or_finish
    required_all_of:
      - resource-graph.json
